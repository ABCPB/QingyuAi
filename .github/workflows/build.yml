name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p XiaoxiaoYuanAI
          cd XiaoxiaoYuanAI

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ChatViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
              @objc func exitApp() { exit(0) }
          }

          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exitApp")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)

                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="UTF-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
                      <title>小小怨AI · 聊天核心</title>
                      <style>
                          * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
                          body {
                              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                              background: #ffffff;
                              height: 100vh;
                              overflow: hidden;
                              display: flex;
                              flex-direction: column;
                          }

                          /* 顶部导航 */
                          .nav-bar {
                              background: #ffffff;
                              padding: 12px 20px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              border-bottom: 1px solid #e9e9ef;
                          }
                          .nav-title {
                              font-size: 18px;
                              font-weight: 600;
                              color: #000000;
                          }
                          .settings-icon {
                              font-size: 24px;
                              background: none;
                              border: none;
                              cursor: pointer;
                              width: 40px;
                              height: 40px;
                              border-radius: 30px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                          }
                          .settings-icon:active { background: #f2f2f6; }

                          /* 聊天区域 */
                          .chat-area {
                              flex: 1;
                              overflow-y: auto;
                              padding: 16px;
                              display: flex;
                              flex-direction: column;
                              gap: 12px;
                          }
                          .message {
                              max-width: 80%;
                              padding: 10px 16px;
                              border-radius: 20px;
                              font-size: 15px;
                              line-height: 1.4;
                              word-break: break-word;
                          }
                          .message.user {
                              align-self: flex-end;
                              background-color: #007aff;
                              color: white;
                              border-bottom-right-radius: 4px;
                          }
                          .message.ai {
                              align-self: flex-start;
                              background-color: #e5e5ea;
                              color: black;
                              border-bottom-left-radius: 4px;
                          }

                          /* 输入区域 */
                          .input-area {
                              display: flex;
                              padding: 10px 12px;
                              background: #ffffff;
                              border-top: 1px solid #e9e9ef;
                              gap: 8px;
                              align-items: center;
                          }
                          .input-field {
                              flex: 1;
                              background: #f2f2f6;
                              border: none;
                              border-radius: 22px;
                              padding: 10px 16px;
                              font-size: 16px;
                              outline: none;
                              font-family: inherit;
                          }
                          .input-field:focus {
                              background: #ffffff;
                              outline: 1px solid #007aff;
                          }
                          .send-button {
                              background-color: #007aff;
                              border: none;
                              border-radius: 30px;
                              width: 44px;
                              height: 44px;
                              color: white;
                              font-size: 18px;
                              cursor: pointer;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                          }
                          .send-button:active {
                              opacity: 0.7;
                              transform: scale(0.96);
                          }

                          /* 左侧边栏菜单 (保留滑动功能，但内容精简) */
                          .sidebar {
                              position: fixed;
                              left: 0;
                              top: 0;
                              width: 260px;
                              height: 100%;
                              background: rgba(255,255,255,0.98);
                              backdrop-filter: blur(20px);
                              padding: 20px;
                              transform: translateX(-100%);
                              transition: transform 0.3s ease;
                              z-index: 1000;
                              box-shadow: 2px 0 12px rgba(0,0,0,0.1);
                              display: flex;
                              flex-direction: column;
                              gap: 20px;
                          }
                          .sidebar.open {
                              transform: translateX(0);
                          }
                          .sidebar button {
                              background: #f2f2f6;
                              border: none;
                              padding: 12px;
                              border-radius: 28px;
                              font-size: 16px;
                              text-align: center;
                              cursor: pointer;
                          }
                          .sidebar button:active { background: #e5e5ea; }

                          /* 设置弹窗 */
                          .modal {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: rgba(0,0,0,0.4);
                              justify-content: center;
                              align-items: center;
                              z-index: 1100;
                          }
                          .modal-card {
                              background: white;
                              border-radius: 28px;
                              padding: 24px;
                              width: 260px;
                              text-align: center;
                              position: relative;
                              box-shadow: 0 4px 20px rgba(0,0,0,0.2);
                          }
                          .close-icon {
                              position: absolute;
                              top: 12px;
                              right: 16px;
                              font-size: 24px;
                              cursor: pointer;
                          }
                          .modal button {
                              background: #f2f2f6;
                              border: none;
                              padding: 10px;
                              border-radius: 28px;
                              margin-top: 16px;
                              width: 100%;
                              cursor: pointer;
                          }

                          /* 开屏动画 */
                          .splash {
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: black;
                              z-index: 2000;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              animation: fadeOut 2s forwards;
                          }
                          .scan-circle {
                              width: 180px;
                              height: 180px;
                              border-radius: 50%;
                              border: 3px solid #4cd964;
                              box-shadow: 0 0 20px #4cd964;
                              position: relative;
                          }
                          .scan-line {
                              position: absolute;
                              top: 0; left: 0;
                              width: 100%;
                              height: 2px;
                              background: #4cd964;
                              animation: scan 1.5s infinite;
                          }
                          @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
                          @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

                          /* 第二界面容器 */
                          .second-screen {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: white;
                              z-index: 1500;
                              flex-direction: column;
                          }
                          .second-header {
                              padding: 16px;
                              background: white;
                              border-bottom: 1px solid #eee;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                      </style>
                  </head>
                  <body>
                      <!-- 开屏动画 -->
                      <div id="splash" class="splash">
                          <div class="scan-circle"><div class="scan-line"></div></div>
                      </div>

                      <!-- 左侧边栏 (滑动菜单) -->
                      <div id="sidebar" class="sidebar">
                          <h3>功能菜单</h3>
                          <button id="openSecondFromSidebar">第二界面</button>
                          <button id="clearAllChat">清空聊天记录</button>
                          <button id="closeSidebarBtn">关闭菜单</button>
                      </div>

                      <!-- 主聊天界面 -->
                      <div class="nav-bar">
                          <span class="nav-title">小小怨AI</span>
                          <button class="settings-icon" id="menuButton">☰</button>
                      </div>
                      <div id="chatArea" class="chat-area">
                          <div class="message ai">你好，我是小小怨AI。右滑打开菜单，输入消息即可聊天。</div>
                      </div>
                      <div class="input-area">
                          <input type="text" id="messageInput" class="input-field" placeholder="输入消息..." autofocus>
                          <button id="sendButton" class="send-button">➤</button>
                      </div>

                      <!-- 设置弹窗 (右上角设置) -->
                      <div id="settingsModal" class="modal">
                          <div class="modal-card">
                              <span class="close-icon" id="closeModal">✕</span>
                              <h3>设置</h3>
                              <button id="clearChatModalBtn">清空聊天</button>
                              <button id="exitAppModalBtn">退出应用</button>
                          </div>
                      </div>

                      <!-- 第二界面 -->
                      <div id="secondScreen" class="second-screen">
                          <div class="second-header">
                              <span>第二界面</span>
                              <button id="closeSecondScreen" style="background:#f2f2f6; border:none; border-radius:20px; padding:6px 12px;">返回</button>
                          </div>
                          <div id="secondChatArea" class="chat-area" style="flex:1;">
                              <div class="message ai">欢迎来到第二界面，这里也可以单独聊天。</div>
                          </div>
                          <div class="input-area">
                              <input type="text" id="secondInput" class="input-field" placeholder="输入消息...">
                              <button id="secondSendBtn" class="send-button">➤</button>
                          </div>
                      </div>

                      <script>
                          (function() {
                              // ---------- 基础界面元素 ----------
                              const chatArea = document.getElementById('chatArea');
                              const secondChatArea = document.getElementById('secondChatArea');
                              const input = document.getElementById('messageInput');
                              const secondInput = document.getElementById('secondInput');
                              const sendBtn = document.getElementById('sendButton');
                              const secondSendBtn = document.getElementById('secondSendBtn');
                              const menuBtn = document.getElementById('menuButton');
                              const sidebar = document.getElementById('sidebar');
                              const closeSidebarBtn = document.getElementById('closeSidebarBtn');
                              const settingsModal = document.getElementById('settingsModal');
                              const closeModal = document.getElementById('closeModal');
                              const clearChatModalBtn = document.getElementById('clearChatModalBtn');
                              const exitAppModalBtn = document.getElementById('exitAppModalBtn');
                              const clearAllChat = document.getElementById('clearAllChat');
                              const openSecondFromSidebar = document.getElementById('openSecondFromSidebar');
                              const secondScreen = document.getElementById('secondScreen');
                              const closeSecondScreen = document.getElementById('closeSecondScreen');

                              // ---------- 数据存储 ----------
                              let messages = JSON.parse(localStorage.getItem('mainChat') || '[]');
                              let secondMessages = JSON.parse(localStorage.getItem('secondChat') || '[]');

                              // ---------- 辅助函数 ----------
                              function renderMessages() {
                                  chatArea.innerHTML = '';
                                  messages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'message ' + msg.role;
                                      div.textContent = msg.content;
                                      chatArea.appendChild(div);
                                  });
                                  chatArea.scrollTop = chatArea.scrollHeight;
                                  localStorage.setItem('mainChat', JSON.stringify(messages));
                              }
                              function renderSecondMessages() {
                                  secondChatArea.innerHTML = '';
                                  secondMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'message ' + msg.role;
                                      div.textContent = msg.content;
                                      secondChatArea.appendChild(div);
                                  });
                                  secondChatArea.scrollTop = secondChatArea.scrollHeight;
                                  localStorage.setItem('secondChat', JSON.stringify(secondMessages));
                              }
                              function addMessage(role, content, isSecond = false) {
                                  if (isSecond) {
                                      secondMessages.push({ role, content });
                                      renderSecondMessages();
                                  } else {
                                      messages.push({ role, content });
                                      renderMessages();
                                  }
                              }

                              // AI 回复逻辑（保留基本能力）
                              function aiReply(userText) {
                                  const lower = userText.toLowerCase();
                                  if (lower.includes('你好')) return '你好呀！我是小小怨AI，很高兴见到你。';
                                  if (lower.includes('你是谁')) return '我是小小怨AI，由CY创造。我能聊天、算数，请随意提问。';
                                  if (lower.includes('计算') || /[\\d]+[\\+\\-\\*\\/][\\d]+/.test(userText)) {
                                      try {
                                          let result = eval(userText);
                                          return '计算结果：' + result;
                                      } catch(e) { return '算式有问题，试试 1+1 这样的格式。'; }
                                  }
                                  return '收到消息：「' + userText + '」\n我会努力学习，陪你聊天解闷。';
                              }

                              // 发送消息主界面
                              function sendMainMessage() {
                                  let txt = input.value.trim();
                                  if (!txt) return;
                                  addMessage('user', txt, false);
                                  input.value = '';
                                  setTimeout(() => {
                                      let reply = aiReply(txt);
                                      addMessage('ai', reply, false);
                                  }, 300);
                              }
                              // 发送第二界面消息
                              function sendSecondMessage() {
                                  let txt = secondInput.value.trim();
                                  if (!txt) return;
                                  addMessage('user', txt, true);
                                  secondInput.value = '';
                                  setTimeout(() => {
                                      let reply = aiReply(txt);
                                      addMessage('ai', reply, true);
                                  }, 300);
                              }

                              // 清空聊天
                              function clearChat() {
                                  messages = [];
                                  renderMessages();
                                  settingsModal.style.display = 'none';
                              }

                              // 侧边栏滑动控制
                              let touchStartX = 0;
                              let isSidebarOpen = false;
                              function openSidebar() { sidebar.classList.add('open'); isSidebarOpen = true; }
                              function closeSidebar() { sidebar.classList.remove('open'); isSidebarOpen = false; }

                              // 触摸事件监听
                              document.body.addEventListener('touchstart', (e) => {
                                  touchStartX = e.touches[0].clientX;
                              }, { passive: false });
                              document.body.addEventListener('touchmove', (e) => {
                                  const deltaX = e.touches[0].clientX - touchStartX;
                                  if (touchStartX < 25 && deltaX > 25 && !isSidebarOpen) {
                                      openSidebar();
                                      e.preventDefault();
                                  }
                                  if (deltaX < -25 && isSidebarOpen) {
                                      closeSidebar();
                                      e.preventDefault();
                                  }
                              }, { passive: false });
                              // 点击空白关闭侧边栏
                              document.addEventListener('click', (e) => {
                                  if (isSidebarOpen && !sidebar.contains(e.target) && e.target !== menuBtn) closeSidebar();
                              });
                              menuBtn.addEventListener('click', () => {
                                  if (isSidebarOpen) closeSidebar();
                                  else openSidebar();
                              });
                              closeSidebarBtn.addEventListener('click', closeSidebar);

                              // 第二界面逻辑
                              openSecondFromSidebar.addEventListener('click', () => {
                                  closeSidebar();
                                  secondScreen.style.display = 'flex';
                              });
                              closeSecondScreen.addEventListener('click', () => { secondScreen.style.display = 'none'; });

                              // 设置弹窗
                              const settingsIcon = document.querySelector('.settings-icon:not(#menuButton)'); // 右上角齿轮
                              if (settingsIcon) {
                                  settingsIcon.addEventListener('click', () => { settingsModal.style.display = 'flex'; });
                              }
                              closeModal.addEventListener('click', () => { settingsModal.style.display = 'none'; });
                              window.addEventListener('click', (e) => {
                                  if (e.target === settingsModal) settingsModal.style.display = 'none';
                              });
                              clearChatModalBtn.addEventListener('click', clearChat);
                              clearAllChat.addEventListener('click', clearChat);
                              exitAppModalBtn.addEventListener('click', () => {
                                  if (window.webkit && window.webkit.messageHandlers.exitApp) {
                                      window.webkit.messageHandlers.exitApp.postMessage(null);
                                  } else { alert('退出功能需要原生环境'); }
                              });

                              // 绑定发送事件
                              sendBtn.addEventListener('click', sendMainMessage);
                              secondSendBtn.addEventListener('click', sendSecondMessage);
                              input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMainMessage(); });
                              secondInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendSecondMessage(); });

                              // 移除开屏动画
                              setTimeout(() => { const s = document.getElementById('splash'); if (s) s.remove(); }, 2000);

                              // 初始化渲染
                              renderMessages();
                              renderSecondMessages();
                              console.log('应用已启动，聊天功能正常，侧边栏滑动可用');
                          })();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exitApp" {
                      (UIApplication.shared.delegate as? AppDelegate)?.exitApp()
                  }
              }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { .all }
          }
          EOF

          cat > main.swift << 'EOF'
          import UIKit
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>XiaoxiaoYuanAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxiaoyuan.ai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          mkdir -p Base.lproj
          cat > Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="小小怨 AI" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                          <color key="textColor" red="0.05" green="0.52" blue="0.53" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="7yF-2U-9Jw"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="TcB-0d-MaD"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF
          cd ..

      - name: Compile and Package IPA
        run: |
          mkdir -p Payload/XiaoxiaoYuanAI.app
          swiftc XiaoxiaoYuanAI/AppDelegate.swift XiaoxiaoYuanAI/main.swift -o Payload/XiaoxiaoYuanAI.app/XiaoxiaoYuanAI -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp XiaoxiaoYuanAI/Info.plist Payload/XiaoxiaoYuanAI.app/
          cp -r XiaoxiaoYuanAI/Base.lproj Payload/XiaoxiaoYuanAI.app/
          zip -r XiaoxiaoYuanAI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiaoxiaoYuanAI-IPA
          path: XiaoxiaoYuanAI.ipa
