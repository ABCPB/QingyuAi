name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p QingyuApp
          cd QingyuApp

          # 复制仓库根目录的 index.html
          mkdir -p Resources
          cp ../index.html Resources/

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = WebViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class WebViewController: UIViewController {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.scrollView.delaysContentTouches = false
                  view.addSubview(webView)
                  guard let filePath = Bundle.main.path(forResource: "index", ofType: "html") else { return }
                  let url = URL(fileURLWithPath: filePath)
                  webView.loadFileURL(url, allowingReadAccessTo: url.deletingLastPathComponent())
              }
          }
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxiaoyuan.ai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          mkdir -p Base.lproj
          cat > Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="小小怨 AI" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                          <color key="textColor" red="0.05" green="0.52" blue="0.53" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="7yF-2U-9Jw"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="TcB-0d-MaD"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF
          cd ..

      - name: Compile and Package IPA
        run: |
          mkdir -p Payload/XiaoxiaoYuanAI.app
          swiftc QingyuApp/AppDelegate.swift -o Payload/XiaoxiaoYuanAI.app/XiaoxiaoYuanAI -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp QingyuApp/Info.plist Payload/XiaoxiaoYuanAI.app/
          cp -r QingyuApp/Resources Payload/XiaoxiaoYuanAI.app/
          zip -r XiaoxiaoYuanAI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiaoxiaoYuanAI-IPA
          path: XiaoxiaoYuanAI.ipa
