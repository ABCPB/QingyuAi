name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p QingyuAI
          cd QingyuAI

          # 所有代码放在一个文件 main.swift 中
          cat > main.swift << 'EOF'
          import UIKit
          import WebKit

          // MARK: - App Delegate
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ChatViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          // MARK: - Chat View Controller
          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!

              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exit")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)

                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
                  <style>
                      * { margin:0; padding:0; box-sizing:border-box; }
                      body { font-family:system-ui; background:#f0fdfa; height:100vh; display:flex; flex-direction:column; }
                      header { background:#0d9488; color:white; padding:16px; text-align:center; font-size:1.2rem; font-weight:bold; }
                      .msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
                      .msg { max-width:80%; padding:8px 12px; border-radius:18px; }
                      .user { align-self:flex-end; background:#0d9488; color:white; }
                      .ai { align-self:flex-start; background:white; border:1px solid #ccfbf1; }
                      .input-area { display:flex; padding:8px; background:white; gap:8px; border-top:1px solid #ccc; }
                      textarea { flex:1; border:1px solid #ccc; border-radius:20px; padding:8px; resize:none; }
                      button { background:#0d9488; border:none; border-radius:30px; width:44px; color:white; font-size:1.2rem; }
                  </style>
                  <body>
                      <header>🦋 青语 AI</header>
                      <div class="msgs" id="msgs"><div class="msg ai">输入 ABC 可退出聊天</div></div>
                      <div class="input-area">
                          <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
                          <button id="send">➤</button>
                      </div>
                      <script>
                          const msgsDiv = document.getElementById('msgs');
                          const input = document.getElementById('input');
                          const btn = document.getElementById('send');
                          function addMsg(text, isUser){
                              const div = document.createElement('div');
                              div.className = 'msg ' + (isUser ? 'user' : 'ai');
                              div.textContent = text;
                              msgsDiv.appendChild(div);
                              msgsDiv.scrollTop = msgsDiv.scrollHeight;
                          }
                          function send(){
                              let txt = input.value.trim();
                              if (!txt) return;
                              if (txt.toUpperCase() === 'ABC') {
                                  if (window.webkit && window.webkit.messageHandlers.exit)
                                      window.webkit.messageHandlers.exit.postMessage(null);
                                  return;
                              }
                              addMsg(txt, true);
                              input.value = '';
                              setTimeout(() => addMsg('收到：' + txt, false), 400);
                          }
                          btn.onclick = send;
                          input.onkeypress = e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } };
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }

              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exit" {
                      let alert = UIAlertController(title: "退出", message: "您输入了ABC，演示结束", preferredStyle: .alert)
                      alert.addAction(UIAlertAction(title: "确定", style: .default, handler: { _ in
                          // 这里可以真正退出，例如 dismiss 或 pop
                      }))
                      present(alert, animated: true)
                  }
              }
          }

          // MARK: - Entry point
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          # Info.plist
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>QingyuAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.qingyu.ai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>青语AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

          # LaunchScreen.storyboard
          mkdir -p Base.lproj
          cat > Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="青语 AI" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                          <color key="textColor" red="0.05" green="0.52" blue="0.53" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="7yF-2U-9Jw"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="TcB-0d-MaD"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF
          cd ..

      - name: Compile and Package IPA
        run: |
          mkdir -p Payload/QingyuAI.app
          # 编译时加上 -parse-as-library 避免顶层代码错误
          swiftc QingyuAI/main.swift -o Payload/QingyuAI.app/QingyuAI -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit -parse-as-library
          cp QingyuAI/Info.plist Payload/QingyuAI.app/
          cp -r QingyuAI/Base.lproj Payload/QingyuAI.app/
          zip -r QingyuAI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: QingyuAI-IPA
          path: QingyuAI.ipa
