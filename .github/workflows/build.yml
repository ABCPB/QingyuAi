name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p XiaoxiaoYuanAI
          cd XiaoxiaoYuanAI

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ChatViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
              @objc func exitApp() { exit(0) }
          }

          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exitApp")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="UTF-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
                      <title>小小怨AI</title>
                      <style>
                          * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
                          body {
                              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                              background: #fff;
                              height: 100vh;
                              overflow: hidden;
                              position: relative;
                          }
                          /* 磨砂背景 */
                          .bg-blur {
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: rgba(0,0,0,0.2);
                              backdrop-filter: blur(20px);
                              z-index: -1;
                          }
                          /* 左侧边栏 */
                          .sidebar {
                              position: fixed;
                              left: 0;
                              top: 0;
                              width: 280px;
                              height: 100%;
                              background: rgba(0,0,0,0.85);
                              backdrop-filter: blur(30px);
                              border-right: 1px solid rgba(255,255,255,0.15);
                              padding: 20px 16px;
                              display: flex;
                              flex-direction: column;
                              gap: 20px;
                              overflow-y: auto;
                              transform: translateX(-100%);
                              transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                              z-index: 100;
                              box-shadow: 4px 0 20px rgba(0,0,0,0.5);
                              border-radius: 0 28px 28px 0;
                          }
                          .sidebar.open { transform: translateX(0); }
                          .avatar { text-align: center; }
                          .avatar-img {
                              width: 90px;
                              height: 90px;
                              border-radius: 50%;
                              background: radial-gradient(circle at 30% 30%, #e0e0e0, #666);
                              box-shadow: 0 10px 25px rgba(0,0,0,0.4), inset 0 1px 2px rgba(255,255,255,0.7), inset 0 -2px 4px rgba(0,0,0,0.2);
                              color: #111;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-size: 56px;
                              font-weight: 500;
                              margin: 0 auto 12px;
                              cursor: pointer;
                              overflow: hidden;
                              transition: transform 0.1s ease;
                          }
                          .avatar-img:active { transform: scale(0.95); }
                          .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
                          .nickname {
                              font-weight: 600;
                              text-align: center;
                              cursor: pointer;
                              padding: 6px;
                              border-radius: 20px;
                              color: #fff;
                              font-size: 18px;
                          }
                          .nickname:hover { background: rgba(255,255,255,0.2); }
                          .card {
                              background: rgba(255,255,255,0.1);
                              backdrop-filter: blur(10px);
                              border-radius: 24px;
                              padding: 12px;
                              border: 1px solid rgba(255,255,255,0.2);
                          }
                          .card-title {
                              font-size: 12px;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              color: #aaa;
                              margin-bottom: 8px;
                          }
                          .device-info p, .log-line {
                              font-size: 12px;
                              color: #ddd;
                              margin: 4px 0;
                          }
                          .log-area {
                              max-height: 150px;
                              overflow-y: auto;
                          }
                          .log-line {
                              border-bottom: 1px solid rgba(255,255,255,0.1);
                              padding: 4px 0;
                              font-family: monospace;
                          }
                          .extra-buttons {
                              display: flex;
                              flex-direction: column;
                              gap: 10px;
                          }
                          .extra-btn {
                              background: rgba(255,255,255,0.15);
                              border: 1px solid rgba(255,255,255,0.3);
                              border-radius: 30px;
                              padding: 10px;
                              font-size: 14px;
                              font-weight: 500;
                              color: white;
                              cursor: pointer;
                              text-align: center;
                              transition: 0.2s;
                          }
                          .extra-btn:hover { background: rgba(255,255,255,0.3); }
                          .chat-container {
                              display: flex;
                              flex-direction: column;
                              height: 100vh;
                              width: 100%;
                          }
                          .nav-bar {
                              background: rgba(0,0,0,0.6);
                              backdrop-filter: blur(20px);
                              padding: 12px 20px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                              border-bottom: 1px solid rgba(255,255,255,0.15);
                          }
                          .nav-title {
                              font-size: 18px;
                              font-weight: 600;
                              color: white;
                          }
                          .settings-icon {
                              font-size: 24px;
                              background: none;
                              border: none;
                              color: white;
                              cursor: pointer;
                              width: 40px;
                              height: 40px;
                              border-radius: 30px;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                          }
                          .settings-icon:active { background: rgba(255,255,255,0.2); }
                          .messages {
                              flex: 1;
                              overflow-y: auto;
                              padding: 16px;
                              display: flex;
                              flex-direction: column;
                              gap: 12px;
                          }
                          .msg {
                              max-width: 80%;
                              padding: 10px 16px;
                              border-radius: 24px;
                              font-size: 15px;
                              line-height: 1.4;
                          }
                          .user {
                              align-self: flex-end;
                              background: #000;
                              color: #fff;
                              border-bottom-right-radius: 6px;
                          }
                          .ai {
                              align-self: flex-start;
                              background: #fff;
                              color: #000;
                              border: 0.5px solid #ccc;
                              border-bottom-left-radius: 6px;
                          }
                          .input-bar {
                              display: flex;
                              padding: 12px 16px;
                              background: rgba(0,0,0,0.7);
                              backdrop-filter: blur(20px);
                              gap: 12px;
                              border-top: 1px solid rgba(255,255,255,0.15);
                          }
                          .input-field {
                              flex: 1;
                              background: rgba(255,255,255,0.95);
                              border: none;
                              border-radius: 30px;
                              padding: 12px 18px;
                              font-size: 16px;
                              outline: none;
                          }
                          .send-btn {
                              background: #fff;
                              border: none;
                              border-radius: 30px;
                              width: 48px;
                              height: 48px;
                              color: #000;
                              font-size: 20px;
                              cursor: pointer;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              transition: 0.2s;
                          }
                          .send-btn:active { transform: scale(0.94); }
                          .dock {
                              background: rgba(0,0,0,0.75);
                              backdrop-filter: blur(30px);
                              border-top: 0.5px solid rgba(255,255,255,0.2);
                              padding: 8px 16px 12px;
                              display: flex;
                              justify-content: space-around;
                              align-items: center;
                              border-radius: 28px 28px 0 0;
                              margin: 0 12px;
                          }
                          .dock-item {
                              background: rgba(255,255,255,0.15);
                              border: none;
                              border-radius: 32px;
                              padding: 8px 20px;
                              font-size: 14px;
                              font-weight: 500;
                              color: white;
                              cursor: pointer;
                              transition: 0.2s;
                              display: flex;
                              align-items: center;
                              gap: 6px;
                          }
                          .dock-item:active { background: rgba(255,255,255,0.3); transform: scale(0.96); }
                          .modal {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: rgba(0,0,0,0.8);
                              backdrop-filter: blur(15px);
                              justify-content: center;
                              align-items: center;
                              z-index: 1000;
                          }
                          .modal-card {
                              background: rgba(30,30,30,0.95);
                              backdrop-filter: blur(20px);
                              border-radius: 32px;
                              padding: 24px;
                              min-width: 260px;
                              color: white;
                              border: 1px solid rgba(255,255,255,0.2);
                              position: relative;
                          }
                          .close-icon {
                              position: absolute;
                              top: 16px;
                              right: 20px;
                              font-size: 28px;
                              cursor: pointer;
                              color: #aaa;
                          }
                          .modal-buttons {
                              display: flex;
                              gap: 12px;
                              justify-content: center;
                              margin-top: 20px;
                          }
                          .modal-btn {
                              background: rgba(255,255,255,0.2);
                              border: none;
                              border-radius: 30px;
                              padding: 8px 16px;
                              color: white;
                              cursor: pointer;
                          }
                          .second-page {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: #fff;
                              flex-direction: column;
                              z-index: 1100;
                          }
                          .second-header {
                              background: #000;
                              color: white;
                              padding: 16px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                          /* 面容ID扫描动画 */
                          .faceid-animation {
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: black;
                              z-index: 2000;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              animation: fadeOut 2s forwards;
                          }
                          .scan-circle {
                              width: 200px;
                              height: 200px;
                              border-radius: 50%;
                              border: 4px solid #4cd964;
                              box-shadow: 0 0 20px #4cd964;
                              position: relative;
                          }
                          .scan-line {
                              position: absolute;
                              top: 0;
                              left: 0;
                              width: 100%;
                              height: 2px;
                              background: #4cd964;
                              animation: scan 1.5s ease-in-out infinite;
                          }
                          @keyframes scan {
                              0% { top: 0; }
                              100% { top: 100%; }
                          }
                          @keyframes fadeOut {
                              0% { opacity: 1; visibility: visible; }
                              90% { opacity: 1; }
                              100% { opacity: 0; visibility: hidden; }
                          }
                      </style>
                  </head>
                  <body>
                      <div class="bg-blur"></div>

                      <!-- 开屏动画（面容ID样式） -->
                      <div id="splash" class="faceid-animation">
                          <div class="scan-circle">
                              <div class="scan-line"></div>
                          </div>
                      </div>

                      <!-- 左侧边栏 -->
                      <div class="sidebar" id="sidebar">
                          <div class="avatar">
                              <div class="avatar-img" id="avatarBtn"><span id="avatarText"></span><input type="file" id="avatarInput" accept="image/*" style="display:none"></div>
                              <div class="nickname" id="nicknameBtn"><span id="nicknameDisplay">小小怨AI</span><input type="text" id="nicknameInput" style="display:none; width:100%; margin-top:8px;"></div>
                          </div>
                          <div class="card">
                              <div class="card-title">本机详情</div>
                              <div class="device-info" id="deviceInfo"></div>
                          </div>
                          <div class="card">
                              <div class="card-title">运行日志</div>
                              <div class="log-area" id="logArea"><div id="logList"></div></div>
                          </div>
                          <div class="extra-buttons">
                              <button class="extra-btn" id="clearDataBtn">清除所有数据</button>
                              <button class="extra-btn" id="aboutAppBtn">关于本应用</button>
                          </div>
                      </div>

                      <!-- 主聊天界面 -->
                      <div class="chat-container">
                          <div class="nav-bar">
                              <span class="nav-title">小小怨AI</span>
                              <button class="settings-icon" id="settingsBtn">⚙️</button>
                          </div>
                          <div class="messages" id="messages">
                              <div class="msg ai">你好！我是小小怨AI，创始人CY创造。左滑可打开侧边栏~</div>
                          </div>
                          <div class="input-bar">
                              <input type="text" class="input-field" id="messageInput" placeholder="输入消息... (输入ABC打开菜单)">
                              <button class="send-btn" id="sendBtn">➤</button>
                          </div>
                          <div class="dock">
                              <button class="dock-item" id="dockHome">💬 聊天</button>
                              <button class="dock-item" id="dockAbc">🔓 ABC</button>
                              <button class="dock-item" id="dockSecond">📱 第二界面</button>
                          </div>
                      </div>

                      <!-- ABC菜单模态框 -->
                      <div id="abcModal" class="modal">
                          <div class="modal-card">
                              <span class="close-icon" id="closeAbcModal">&times;</span>
                              <h3 style="text-align:center">功能菜单</h3>
                              <div class="modal-buttons">
                                  <button class="modal-btn" id="exitAppBtn">退出程序</button>
                                  <button class="modal-btn" id="restartBtn">重新启动</button>
                                  <button class="modal-btn" id="openSecondPageBtn">第二界面</button>
                              </div>
                          </div>
                      </div>

                      <!-- 设置面板 -->
                      <div id="settingsModal" class="modal">
                          <div class="modal-card">
                              <span class="close-icon" id="closeSettingsBtn">&times;</span>
                              <h3 style="margin-bottom:20px">设置</h3>
                              <div style="display:flex; flex-direction:column; gap:12px;">
                                  <button class="modal-btn" id="clearCacheBtn">清除聊天缓存</button>
                                  <button class="modal-btn" id="themeToggleBtn">切换主题（亮/暗）</button>
                                  <button class="modal-btn" id="aboutBtn">关于</button>
                                  <button class="modal-btn" id="settingsSecondPageBtn">进入第二界面</button>
                              </div>
                          </div>
                      </div>

                      <!-- 第二界面 -->
                      <div id="secondPage" class="second-page">
                          <div class="second-header">
                              <span>第二界面 · 小小怨AI</span>
                              <button id="backFromSecond" style="background:white; border:none; border-radius:30px; padding:6px 16px;">返回</button>
                          </div>
                          <div class="messages" id="secondMessages" style="flex:1; overflow-y:auto; padding:16px;">
                              <div class="msg ai">欢迎来到第二界面！</div>
                          </div>
                          <div class="input-bar">
                              <input type="text" class="input-field" id="secondInput" placeholder="输入消息...">
                              <button class="send-btn" id="secondSendBtn">➤</button>
                          </div>
                      </div>

                      <script>
                          (function(){
                              // DOM 元素
                              const sidebar = document.getElementById('sidebar');
                              const messagesDiv = document.getElementById('messages');
                              const secondMessagesDiv = document.getElementById('secondMessages');
                              const input = document.getElementById('messageInput');
                              const secondInput = document.getElementById('secondInput');
                              const sendBtn = document.getElementById('sendBtn');
                              const secondSendBtn = document.getElementById('secondSendBtn');
                              const nicknameDisplay = document.getElementById('nicknameDisplay');
                              const avatarText = document.getElementById('avatarText');
                              const deviceInfoDiv = document.getElementById('deviceInfo');
                              const logList = document.getElementById('logList');
                              const settingsBtn = document.getElementById('settingsBtn');
                              const settingsModal = document.getElementById('settingsModal');
                              const closeSettingsBtn = document.getElementById('closeSettingsBtn');
                              const abcModal = document.getElementById('abcModal');
                              const closeAbcModal = document.getElementById('closeAbcModal');
                              const secondPage = document.getElementById('secondPage');
                              const backFromSecond = document.getElementById('backFromSecond');
                              const clearCacheBtn = document.getElementById('clearCacheBtn');
                              const themeToggleBtn = document.getElementById('themeToggleBtn');
                              const aboutBtn = document.getElementById('aboutBtn');
                              const restartBtn = document.getElementById('restartBtn');
                              const exitAppBtn = document.getElementById('exitAppBtn');
                              const openSecondPageBtn = document.getElementById('openSecondPageBtn');
                              const settingsSecondPageBtn = document.getElementById('settingsSecondPageBtn');
                              const clearDataBtn = document.getElementById('clearDataBtn');
                              const aboutAppBtn = document.getElementById('aboutAppBtn');
                              const dockHome = document.getElementById('dockHome');
                              const dockAbc = document.getElementById('dockAbc');
                              const dockSecond = document.getElementById('dockSecond');
                              // 开屏动画2秒后自动移除
                              setTimeout(() => {
                                  const splash = document.getElementById('splash');
                                  if(splash) splash.remove();
                              }, 2000);

                              // 数据存储
                              let chatMessages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
                              let secondMessages = JSON.parse(localStorage.getItem('secondMessages') || '[]');
                              let currentAvatar = localStorage.getItem('avatar') || '';
                              let currentNickname = localStorage.getItem('nickname') || '小小怨AI';

                              function addLog(msg){
                                  const logDiv = document.createElement('div');
                                  logDiv.className = 'log-line';
                                  logDiv.textContent = new Date().toLocaleTimeString() + ' ' + msg;
                                  logList.prepend(logDiv);
                                  if(logList.children.length > 30) logList.removeChild(logList.lastChild);
                              }
                              function loadDeviceInfo(){
                                  const ua = navigator.userAgent;
                                  let model = '未知';
                                  if(/iPhone/.test(ua)) model = 'iPhone';
                                  else if(/iPad/.test(ua)) model = 'iPad';
                                  else if(/Mac/.test(ua)) model = 'Mac';
                                  deviceInfoDiv.innerHTML = `<p>型号：${model}</p><p>系统：${navigator.platform}</p><p>版本：2.0</p><p>小小怨AI · 黑白磨砂</p>`;
                              }
                              function renderMessages(){
                                  messagesDiv.innerHTML = '';
                                  chatMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      messagesDiv.appendChild(div);
                                  });
                                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                  localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
                              }
                              function renderSecondMessages(){
                                  secondMessagesDiv.innerHTML = '';
                                  secondMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      secondMessagesDiv.appendChild(div);
                                  });
                                  secondMessagesDiv.scrollTop = secondMessagesDiv.scrollHeight;
                                  localStorage.setItem('secondMessages', JSON.stringify(secondMessages));
                              }
                              function evaluateMath(expr){
                                  expr = expr.replace(/\\s/g, '');
                                  if(!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(expr)) return null;
                                  try {
                                      let result = Function('"use strict";return (' + expr + ')')();
                                      if(typeof result === 'number' && !isNaN(result) && isFinite(result)) return result.toString();
                                  } catch(e){}
                                  return null;
                              }
                              function getRichAnswer(text){
                                  const lower = text.toLowerCase().trim();
                                  if(lower.match(/^(你好|嗨|hi|hello|在吗|您好)$/)){
                                      const greets = ["你好呀！我是小小怨AI～", "嗨！遇到你真开心", "在的，有什么可以帮你？", "Hello！我是CY创造的小小怨"];
                                      return greets[Math.floor(Math.random() * greets.length)];
                                  }
                                  if(lower.includes('你是谁') || lower.includes('介绍')) return "我是小小怨AI，由创始人CY打造。我会算数、能聊天，还能讲笑话～";
                                  if(lower.includes('创始人') || lower.includes('cy')) return "CY是一位神秘开发者，赋予我智慧和幽默。";
                                  if(lower.includes('开心')) return "看到你开心我也开心！";
                                  if(lower.includes('难过')) return "抱抱你，我会一直陪着你。";
                                  if(lower.includes('能做什么')) return "我可以聊天、算数、回答简单问题，还能记住你的名字和头像！";
                                  if(lower.includes('笑话')) return "为什么程序员总是分不清万圣节和圣诞节？因为 Oct 31 = Dec 25！";
                                  if(lower.includes('天气')) return "我暂时不会查天气，但可以陪你聊天～";
                                  if(lower.includes('谢谢')) return "不客气，为你服务是我的荣幸！";
                                  if(lower.includes('再见')) return "再见啦，记得常来找我玩！";
                                  return null;
                              }
                              const universal = ["这个问题很有趣", "CY说过：好奇心是进步的源泉", "能详细说说吗？", "我需要更多时间思考", "你的见解很独特"];
                              function generateReply(userText){
                                  let math = evaluateMath(userText);
                                  if(math) return "计算结果：" + userText + " = " + math;
                                  let rich = getRichAnswer(userText);
                                  if(rich) return rich;
                                  return universal[Math.floor(Math.random() * universal.length)];
                              }
                              function sendMessage(){
                                  let txt = input.value.trim();
                                  if(!txt) return;
                                  if(txt.toUpperCase() === "ABC"){
                                      abcModal.style.display = 'flex';
                                      return;
                                  }
                                  chatMessages.push({ role: 'user', content: txt });
                                  renderMessages();
                                  input.value = '';
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      chatMessages.push({ role: 'ai', content: reply });
                                      renderMessages();
                                      addLog(`用户: ${txt.substring(0,30)} → ${reply.substring(0,30)}`);
                                  }, 400);
                              }
                              function sendSecondMessage(){
                                  let txt = secondInput.value.trim();
                                  if(!txt) return;
                                  secondMessages.push({ role: 'user', content: txt });
                                  renderSecondMessages();
                                  secondInput.value = '';
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      secondMessages.push({ role: 'ai', content: reply });
                                      renderSecondMessages();
                                      addLog(`第二界面: ${txt.substring(0,30)} → ${reply.substring(0,30)}`);
                                  }, 400);
                              }
                              function loadAvatarAndNickname(){
                                  if(currentAvatar.startsWith('data:') || currentAvatar.startsWith('http')){
                                      avatarText.innerHTML = `<img src="${currentAvatar}" style="width:100%;height:100%;object-fit:cover">`;
                                  } else {
                                      avatarText.textContent = currentAvatar;
                                  }
                                  nicknameDisplay.textContent = currentNickname;
                              }
                              document.getElementById('avatarBtn').addEventListener('click', () => {
                                  const fileInput = document.getElementById('avatarInput');
                                  fileInput.onchange = (e) => {
                                      const file = e.target.files[0];
                                      if(file){
                                          const reader = new FileReader();
                                          reader.onload = (ev) => {
                                              currentAvatar = ev.target.result;
                                              localStorage.setItem('avatar', currentAvatar);
                                              loadAvatarAndNickname();
                                              addLog('头像已更新');
                                          };
                                          reader.readAsDataURL(file);
                                      }
                                  };
                                  fileInput.click();
                              });
                              document.getElementById('nicknameBtn').addEventListener('click', () => {
                                  const span = document.getElementById('nicknameDisplay');
                                  const inputNick = document.getElementById('nicknameInput');
                                  span.style.display = 'none';
                                  inputNick.style.display = 'block';
                                  inputNick.value = currentNickname;
                                  inputNick.focus();
                                  inputNick.onblur = () => {
                                      if(inputNick.value.trim()){
                                          currentNickname = inputNick.value.trim();
                                          localStorage.setItem('nickname', currentNickname);
                                          nicknameDisplay.textContent = currentNickname;
                                          addLog(`昵称已改为: ${currentNickname}`);
                                      }
                                      span.style.display = 'block';
                                      inputNick.style.display = 'none';
                                  };
                                  inputNick.onkeypress = (e) => { if(e.key==='Enter') inputNick.blur(); };
                              });
                              // 侧边栏滑动
                              let touchStartX = 0;
                              let isSidebarOpen = false;
                              function updateSidebar(){
                                  if(isSidebarOpen) sidebar.classList.add('open');
                                  else sidebar.classList.remove('open');
                              }
                              document.body.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
                              document.body.addEventListener('touchmove', (e) => {
                                  const deltaX = e.touches[0].clientX - touchStartX;
                                  if(touchStartX < 25 && deltaX > 30 && !isSidebarOpen){
                                      isSidebarOpen = true;
                                      updateSidebar();
                                      addLog('侧边栏已展开');
                                  }
                                  if(deltaX < -30 && isSidebarOpen){
                                      isSidebarOpen = false;
                                      updateSidebar();
                                      addLog('侧边栏已收起');
                                  }
                              }, { passive: false });
                              document.addEventListener('click', (e) => {
                                  if(isSidebarOpen && !sidebar.contains(e.target) && !e.target.closest('.sidebar')){
                                      isSidebarOpen = false;
                                      updateSidebar();
                                  }
                              });
                              // 模态框
                              closeAbcModal.onclick = () => abcModal.style.display = 'none';
                              window.onclick = (e) => { if(e.target === abcModal) abcModal.style.display = 'none'; if(e.target === settingsModal) settingsModal.style.display = 'none'; };
                              settingsBtn.onclick = () => settingsModal.style.display = 'flex';
                              closeSettingsBtn.onclick = () => settingsModal.style.display = 'none';
                              exitAppBtn.onclick = () => { if(window.webkit && window.webkit.messageHandlers.exitApp) window.webkit.messageHandlers.exitApp.postMessage(null); else alert("退出需要原生支持"); };
                              restartBtn.onclick = () => location.reload();
                              openSecondPageBtn.onclick = () => { abcModal.style.display = 'none'; secondPage.style.display = 'flex'; };
                              settingsSecondPageBtn.onclick = () => { settingsModal.style.display = 'none'; secondPage.style.display = 'flex'; };
                              backFromSecond.onclick = () => secondPage.style.display = 'none';
                              clearCacheBtn.onclick = () => { if(confirm('清除聊天记录？')){ chatMessages=[]; secondMessages=[]; renderMessages(); renderSecondMessages(); addLog('聊天缓存已清除'); settingsModal.style.display='none'; } };
                              themeToggleBtn.onclick = () => { document.body.style.backgroundColor = document.body.style.backgroundColor === '#fff' ? '#000' : '#fff'; addLog('主题切换'); };
                              aboutBtn.onclick = () => alert('小小怨AI v2.0\\n创始人：CY\\n黑白磨砂·Dock栏·立体苹果');
                              clearDataBtn.onclick = () => { localStorage.clear(); chatMessages=[]; secondMessages=[]; renderMessages(); renderSecondMessages(); addLog('所有数据已清除'); };
                              aboutAppBtn.onclick = () => alert('小小怨AI — 黑白磨砂质感\\n边缘钝化苹果风格\\nDock栏快速访问');
                              // Dock 按钮
                              dockHome.onclick = () => { if(secondPage.style.display === 'flex') secondPage.style.display = 'none'; input.focus(); };
                              dockAbc.onclick = () => abcModal.style.display = 'flex';
                              dockSecond.onclick = () => secondPage.style.display = 'flex';
                              // 发送按钮
                              sendBtn.onclick = sendMessage;
                              secondSendBtn.onclick = sendSecondMessage;
                              input.addEventListener('keypress', (e) => { if(e.key === 'Enter'){ e.preventDefault(); sendMessage(); } });
                              secondInput.addEventListener('keypress', (e) => { if(e.key === 'Enter'){ e.preventDefault(); sendSecondMessage(); } });
                              // 初始化
                              loadDeviceInfo();
                              loadAvatarAndNickname();
                              renderMessages();
                              renderSecondMessages();
                              addLog('应用启动 | 黑白磨砂 | Dock栏可用 | 面容ID开屏');
                          })();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exitApp" {
                      (UIApplication.shared.delegate as? AppDelegate)?.exitApp()
                  }
              }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { .all }
          }
          EOF

          cat > main.swift << 'EOF'
          import UIKit
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

