name: Build IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p App
          cd App
          cat > main.swift << 'EOF'
          import UIKit
          import WebKit
          @main class App: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = WebVC()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          class WebVC: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let wv = WKWebView(frame: view.bounds)
                  wv.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(wv)
                  wv.loadHTMLString("""
                  <!DOCTYPE html>
                  <html><head><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"></head>
                  <body style="margin:0; background:#f0fdfa; font-family:system-ui; height:100vh; display:flex; flex-direction:column;">
                  <div style="padding:12px; background:#0f766e; color:white; text-align:center; font-weight:bold;">小小怨AI</div>
                  <div id="chat" style="flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px;"></div>
                  <div style="display:flex; padding:8px; gap:8px; background:white;"><input id="in" style="flex:1; border-radius:20px; border:1px solid #ccc; padding:8px;"><button id="send" style="background:#0d9488; border:none; border-radius:30px; width:44px; color:white;">➤</button></div>
                  <script>
                  let msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
                  function render(){ let d=document.getElementById('chat'); d.innerHTML=''; msgs.forEach(m=>{ let div=document.createElement('div'); div.className='message'; div.style.cssText='max-width:80%; padding:8px 12px; border-radius:18px; '+(m.role==='user'?'align-self:flex-end; background:#0d9488; color:white;':'align-self:flex-start; background:white; border:1px solid #ccc;'); div.innerText=m.content; d.appendChild(div); }); d.scrollTop=d.scrollHeight; localStorage.setItem('msgs',JSON.stringify(msgs)); }
                  function evaluateMath(e){e=e.replace(/\\s/g,''); if(!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(e))return null; try{return Function('"use strict";return ('+e+')')().toString();}catch(e){return null;}}
                  function getReply(t){let math=evaluateMath(t); if(math) return t+' = '+math; let lower=t.toLowerCase(); if(lower.includes('你好')) return '你好呀！我是小小怨AI，主人是CY。'; if(lower.includes('主人')) return '我的主人是伟大的CY。'; if(lower.includes('谢谢')) return '不客气～'; if(lower.includes('再见')) return '再见啦！'; return '收到：'+t+'（花言巧语：你真有眼光✨）';}
                  function send(){ let inp=document.getElementById('in'); let t=inp.value.trim(); if(!t)return; if(t==='ABC'){ document.getElementById('second').style.display='flex'; inp.value=''; return; } msgs.push({role:'user',content:t}); render(); inp.value=''; setTimeout(()=>{ let reply=getReply(t); msgs.push({role:'ai',content:reply}); render(); },300); }
                  document.getElementById('send').onclick=send; document.getElementById('in').addEventListener('keypress',e=>{if(e.key==='Enter')send();});
                  render();
                  </script>
                  <div id="second" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:none; flex-direction:column; z-index:100;">
                      <div style="padding:12px; background:#0f766e; color:white; display:flex; justify-content:space-between;"><span>第二界面</span><button id="back" style="background:white; border:none; border-radius:20px; padding:4px 12px;">返回</button></div>
                      <div id="chat2" style="flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px;"></div>
                      <div style="display:flex; padding:8px; gap:8px; background:white;"><input id="in2" style="flex:1; border-radius:20px; border:1px solid #ccc; padding:8px;"><button id="send2" style="background:#0d9488; border:none; border-radius:30px; width:44px; color:white;">➤</button></div>
                  </div>
                  <script>
                  let msgs2=JSON.parse(localStorage.getItem('msgs2')||'[]');
                  function render2(){ let d=document.getElementById('chat2'); d.innerHTML=''; msgs2.forEach(m=>{ let div=document.createElement('div'); div.style.cssText='max-width:80%; padding:8px 12px; border-radius:18px; '+(m.role==='user'?'align-self:flex-end; background:#0d9488; color:white;':'align-self:flex-start; background:white; border:1px solid #ccc;'); div.innerText=m.content; d.appendChild(div); }); d.scrollTop=d.scrollHeight; localStorage.setItem('msgs2',JSON.stringify(msgs2)); }
                  function send2(){ let inp=document.getElementById('in2'); let t=inp.value.trim(); if(!t)return; msgs2.push({role:'user',content:t}); render2(); inp.value=''; setTimeout(()=>{ let reply=getReply(t); msgs2.push({role:'ai',content:reply}); render2(); },300); }
                  document.getElementById('send2').onclick=send2; document.getElementById('in2').addEventListener('keypress',e=>{if(e.key==='Enter')send2();}); document.getElementById('back').onclick=()=>{document.getElementById('second').style.display='none';}; render2();
                  </script>
                  </body>
                  </html>
                  """, baseURL: nil)
              }
          }
          EOF
          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>CFBundleExecutable</key><string>App</string><key>CFBundleIdentifier</key><string>com.xiaoxiaoyuan</string><key>CFBundleName</key><string>小小怨AI</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string></dict></plist>
          EOF
          mkdir -p Base.lproj
          echo '<document/>' > Base.lproj/LaunchScreen.storyboard
          cd ..
          mkdir -p Payload/App.app
          swiftc App/main.swift -o Payload/App.app/App -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp App/Info.plist Payload/App.app/
          cp -r App/Base.lproj Payload/App.app/
          zip -r XiaoxiaoYuanAI.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: XiaoxiaoYuanAI-IPA
          path: XiaoxiaoYuanAI.ipa
