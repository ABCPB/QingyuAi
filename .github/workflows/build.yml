name: Build IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p App
          cd App

          cat > main.swift << 'EOF'
          import UIKit
          import WebKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  let webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.scrollView.keyboardDismissMode = .none
                  webView.scrollView.delaysContentTouches = false
                  view.addSubview(webView)

                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
                      <style>
                          body {
                              margin:0; padding:20px; font-family:system-ui; background:#f0fdfa; display:flex; flex-direction:column; height:100vh;
                          }
                          #chat {
                              flex:1; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; background:white;
                          }
                          .msg {
                              margin:8px 0; padding:8px 12px; border-radius:20px; max-width:80%;
                          }
                          .user { background:#0d9488; color:white; align-self:flex-end; margin-left:auto; }
                          .ai { background:#e2e8f0; color:black; }
                          .input-area { display:flex; gap:10px; }
                          input { flex:1; padding:12px; border:1px solid #ccc; border-radius:30px; font-size:16px; }
                          button { background:#0d9488; border:none; border-radius:30px; padding:12px 20px; color:white; font-size:16px; cursor:pointer; }
                      </style>
                  </head>
                  <body>
                      <div id="chat"></div>
                      <div class="input-area">
                          <input id="msgInput" placeholder="输入消息..." autofocus>
                          <button id="sendBtn" onclick="sendMessage()">发送</button>
                      </div>
                      <script>
                          let messages = [];
                          const chatDiv = document.getElementById('chat');
                          const input = document.getElementById('msgInput');

                          function render() {
                              chatDiv.innerHTML = '';
                              messages.forEach(m => {
                                  const div = document.createElement('div');
                                  div.className = 'msg ' + m.role;
                                  div.innerText = m.content;
                                  chatDiv.appendChild(div);
                              });
                              chatDiv.scrollTop = chatDiv.scrollHeight;
                          }

                          function aiReply(text) {
                              const lower = text.toLowerCase();
                              if (lower.includes('你好')) return '你好呀！我是小小怨AI。';
                              if (lower.includes('计算') && /\\d+[\\+\\-\\*\\/]\\d+/.test(text)) {
                                  try { return '计算结果：' + eval(text); } catch(e) {}
                              }
                              return '收到：' + text + '（测试回复）';
                          }

                          window.sendMessage = function() {
                              let text = input.value.trim();
                              if (!text) return;
                              messages.push({ role: 'user', content: text });
                              render();
                              input.value = '';
                              setTimeout(() => {
                                  let reply = aiReply(text);
                                  messages.push({ role: 'ai', content: reply });
                                  render();
                              }, 300);
                          }

                          input.addEventListener('keypress', function(e) {
                              if (e.key === 'Enter') sendMessage();
                          });

                          // 初始欢迎语
                          messages.push({ role: 'ai', content: '你好！我是小小怨AI，主人是CY。输入消息测试聊天。' });
                          render();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
          }
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>App</string>
              <key>CFBundleIdentifier</key>
              <string>com.test.chat</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

          mkdir -p Base.lproj
          echo '<document/>' > Base.lproj/LaunchScreen.storyboard

          cd ..
          mkdir -p Payload/App.app
          swiftc App/main.swift -o Payload/App.app/App -parse-as-library -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp App/Info.plist Payload/App.app/
          cp -r App/Base.lproj Payload/App.app/
          zip -r ChatTest.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ChatTest-IPA
          path: ChatTest.ipa
