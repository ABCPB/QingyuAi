name: Build IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          mkdir -p App
          cd App

          cat > main.swift << 'EOF'
          import UIKit
          import WebKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          class ViewController: UIViewController {
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  let webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.scrollView.delaysContentTouches = false
                  webView.scrollView.keyboardDismissMode = .none
                  view.addSubview(webView)

                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="UTF-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
                      <title>小小怨AI</title>
                      <style>
                          * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
                          body { font-family:system-ui; background:#f0fdfa; height:100vh; display:flex; flex-direction:column; }
                          .header { background:white; padding:12px 16px; border-bottom:1px solid #ccfbf1; display:flex; justify-content:space-between; align-items:center; }
                          .title { font-weight:600; color:#0f766e; font-size:1.1rem; }
                          .btn-icon { background:none; border:none; font-size:1.2rem; cursor:pointer; width:34px; height:34px; border-radius:8px; }
                          .chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
                          .msg { display:flex; gap:10px; max-width:85%; animation:fadeIn 0.3s; }
                          .msg.user { align-self:flex-end; flex-direction:row-reverse; }
                          .msg.ai { align-self:flex-start; }
                          .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:#e2e8f0; }
                          .user .avatar { background:linear-gradient(135deg,#14b8a6,#0d9488); color:white; }
                          .bubble { padding:10px 14px; border-radius:18px; line-height:1.4; word-break:break-word; }
                          .user .bubble { background:#0d9488; color:white; border-bottom-right-radius:4px; }
                          .ai .bubble { background:white; border:1px solid #ccfbf1; border-bottom-left-radius:4px; }
                          .time { font-size:0.68rem; color:#94a3b8; margin-top:3px; text-align:right; }
                          .input-area { padding:12px; background:white; border-top:1px solid #ccfbf1; display:flex; gap:10px; }
                          textarea { flex:1; border:2px solid #99f6e4; border-radius:24px; padding:10px 16px; font-size:0.9rem; resize:none; outline:none; }
                          button { background:#0d9488; border:none; border-radius:30px; width:48px; color:white; font-size:1.2rem; cursor:pointer; }
                          .second-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:200; display:none; flex-direction:column; }
                          .second-header { background:#0f766e; color:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
                          .back-btn { background:white; border:none; border-radius:20px; padding:6px 12px; cursor:pointer; color:#0f766e; }
                          .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:300; }
                          .modal-card { background:white; border-radius:24px; padding:24px; width:280px; text-align:center; }
                          .typing { display:flex; gap:4px; margin-left:44px; }
                          .dot { width:6px; height:6px; border-radius:50%; background:#2dd4bf; animation:bounce 1.4s infinite; }
                          @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-8px); } }
                          @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
                      </style>
                  </head>
                  <body>
                      <div class="header">
                          <span class="title">小小怨AI</span>
                          <div>
                              <button class="btn-icon" id="newBtn" title="新建">✨</button>
                              <button class="btn-icon" id="clearBtn" title="清空">🧹</button>
                              <button class="btn-icon" id="settingsBtn" title="设置">⚙️</button>
                          </div>
                      </div>
                      <div class="chat" id="chat"></div>
                      <div class="input-area">
                          <textarea id="input" rows="1" placeholder="输入消息... (ABC进入第二界面)"></textarea>
                          <button id="sendBtn">➤</button>
                      </div>
                      <div id="secondScreen" class="second-screen">
                          <div class="second-header"><span>第二界面</span><button class="back-btn" id="backBtn">返回</button></div>
                          <div class="chat" id="secondChat"></div>
                          <div class="input-area"><textarea id="secondInput" rows="1" placeholder="输入消息..."></textarea><button id="secondSendBtn">➤</button></div>
                      </div>
                      <div id="settingsModal" class="modal">
                          <div class="modal-card"><h3>设置</h3><button id="clearAllBtn">清除所有记录</button><button id="closeModalBtn">关闭</button></div>
                      </div>
                      <script>
                          (function(){
                              let messages = JSON.parse(localStorage.getItem('msgs') || '[]');
                              let secondMsgs = JSON.parse(localStorage.getItem('secondMsgs') || '[]');
                              const chatDiv = document.getElementById('chat');
                              const secondChatDiv = document.getElementById('secondChat');
                              const input = document.getElementById('input');
                              const secondInput = document.getElementById('secondInput');
                              const sendBtn = document.getElementById('sendBtn');
                              const secondSendBtn = document.getElementById('secondSendBtn');
                              const newBtn = document.getElementById('newBtn');
                              const clearBtn = document.getElementById('clearBtn');
                              const settingsBtn = document.getElementById('settingsBtn');
                              const secondScreen = document.getElementById('secondScreen');
                              const backBtn = document.getElementById('backBtn');
                              const settingsModal = document.getElementById('settingsModal');
                              const clearAllBtn = document.getElementById('clearAllBtn');
                              const closeModalBtn = document.getElementById('closeModalBtn');

                              function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
                              function formatTime(iso) { if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
                              function renderChat() {
                                  chatDiv.innerHTML = '';
                                  messages.forEach(m => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + m.role;
                                      const avatar = m.role==='user'?'👤':'🦋';
                                      div.innerHTML = '<div class="avatar">'+avatar+'</div><div><div class="bubble">'+escapeHtml(m.content)+'</div><div class="time">'+formatTime(m.time)+'</div></div>';
                                      chatDiv.appendChild(div);
                                  });
                                  chatDiv.scrollTop = chatDiv.scrollHeight;
                                  localStorage.setItem('msgs', JSON.stringify(messages));
                              }
                              function renderSecondChat() {
                                  secondChatDiv.innerHTML = '';
                                  secondMsgs.forEach(m => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + m.role;
                                      const avatar = m.role==='user'?'👤':'🦋';
                                      div.innerHTML = '<div class="avatar">'+avatar+'</div><div><div class="bubble">'+escapeHtml(m.content)+'</div><div class="time">'+formatTime(m.time)+'</div></div>';
                                      secondChatDiv.appendChild(div);
                                  });
                                  secondChatDiv.scrollTop = secondChatDiv.scrollHeight;
                                  localStorage.setItem('secondMsgs', JSON.stringify(secondMsgs));
                              }
                              function showTyping(container) {
                                  hideTyping();
                                  const typing = document.createElement('div');
                                  typing.className = 'typing';
                                  typing.id = 'typing';
                                  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
                                  container.appendChild(typing);
                                  container.scrollTop = container.scrollHeight;
                              }
                              function hideTyping() { const el=document.getElementById('typing'); if(el) el.remove(); }
                              function evaluateMath(expr) {
                                  expr = expr.replace(/\\s/g,'');
                                  if(!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(expr)) return null;
                                  try { let result = Function('"use strict";return ('+expr+')')(); if(typeof result==='number'&&!isNaN(result)&&isFinite(result)) return result.toString(); } catch(e){}
                                  return null;
                              }
                              const sweet = ["你的眼睛里有星辰大海✨","你笑起来真好看","CY说过：遇见你是一种幸运","和你聊天很开心","你的思考很独特"];
                              function getReply(txt) {
                                  let math = evaluateMath(txt);
                                  if(math) return txt+' = '+math;
                                  let lower = txt.toLowerCase();
                                  if(lower.includes('你好')) return "你好呀！我是小小怨AI，主人是CY。";
                                  if(lower.includes('主人')||lower.includes('cy')) return "我的主人是伟大的CY。";
                                  if(lower.includes('谢谢')) return "不客气～";
                                  if(lower.includes('再见')) return "再见啦！";
                                  return sweet[Math.floor(Math.random()*sweet.length)] + " " + ["这个问题很有趣","能多说一点吗","CY会保佑你的"][Math.floor(Math.random()*3)];
                              }
                              function addMessage(role, content, isSecond=false) {
                                  const msg = { role, content, time: new Date().toISOString() };
                                  if(isSecond) { secondMsgs.push(msg); renderSecondChat(); }
                                  else { messages.push(msg); renderChat(); }
                              }
                              function sendMessage() {
                                  let txt = input.value.trim();
                                  if(!txt) return;
                                  if(txt.toUpperCase() === "ABC") {
                                      secondScreen.style.display = 'flex';
                                      input.value = '';
                                      return;
                                  }
                                  addMessage('user', txt);
                                  input.value = '';
                                  showTyping(chatDiv);
                                  setTimeout(() => {
                                      let reply = getReply(txt);
                                      hideTyping();
                                      addMessage('ai', reply);
                                  }, 400);
                              }
                              function sendSecondMessage() {
                                  let txt = secondInput.value.trim();
                                  if(!txt) return;
                                  addMessage('user', txt, true);
                                  secondInput.value = '';
                                  showTyping(secondChatDiv);
                                  setTimeout(() => {
                                      let reply = getReply(txt);
                                      hideTyping();
                                      addMessage('ai', reply, true);
                                  }, 400);
                              }
                              function newChat() {
                                  if(messages.length>0 && confirm('新建对话会清空当前记录，确定吗？')) {
                                      messages = [];
                                      renderChat();
                                      addMessage('ai', '新对话已创建！你好～');
                                  }
                              }
                              function clearCurrent() {
                                  if(messages.length>0 && confirm('清空当前对话？')) {
                                      messages = [];
                                      renderChat();
                                      addMessage('ai', '对话已清空。');
                                  }
                              }
                              function clearAll() {
                                  if(confirm('清除所有记录（包括第二界面）？')) {
                                      messages = [];
                                      secondMsgs = [];
                                      renderChat();
                                      renderSecondChat();
                                      addMessage('ai', '所有记录已清空。');
                                      settingsModal.style.display = 'none';
                                  }
                              }
                              sendBtn.onclick = sendMessage;
                              secondSendBtn.onclick = sendSecondMessage;
                              input.addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
                              secondInput.addEventListener('keypress', e => { if(e.key==='Enter') sendSecondMessage(); });
                              newBtn.onclick = newChat;
                              clearBtn.onclick = clearCurrent;
                              settingsBtn.onclick = () => { settingsModal.style.display = 'flex'; };
                              closeModalBtn.onclick = () => { settingsModal.style.display = 'none'; };
                              clearAllBtn.onclick = clearAll;
                              backBtn.onclick = () => { secondScreen.style.display = 'none'; };
                              window.onclick = e => { if(e.target === settingsModal) settingsModal.style.display = 'none'; };
                              renderChat();
                              renderSecondChat();
                              input.focus();
                          })();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
          }
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>App</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxiaoyuan.ai</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          mkdir -p Base.lproj
          cat > Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="小小怨AI" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                          <color key="textColor" red="0.05" green="0.52" blue="0.53" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="7yF-2U-9Jw"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="TcB-0d-MaD"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF

          cd ..
          mkdir -p Payload/App.app
          swiftc App/main.swift -o Payload/App.app/App -parse-as-library -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp App/Info.plist Payload/App.app/
          cp -r App/Base.lproj Payload/App.app/
          zip -r XiaoxiaoYuanAI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiaoxiaoYuanAI-IPA
          path: XiaoxiaoYuanAI.ipa
