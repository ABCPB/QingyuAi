name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p XiaoxiaoYuanAI
          cd XiaoxiaoYuanAI

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ChatViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
              @objc func exitApp() {
                  exit(0)
              }
          }

          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exitApp")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta charset="UTF-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
                      <title>小小怨AI</title>
                      <style>
                          * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
                          body {
                              font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                              background: #f0fdfa;
                              height: 100vh;
                              overflow: hidden;
                              display: flex;
                              position: relative;
                          }
                          /* 左侧边栏 */
                          .sidebar {
                              width: 20%;
                              min-width: 120px;
                              background: #e2f5f3;
                              border-right: 1px solid #ccc;
                              padding: 16px;
                              display: flex;
                              flex-direction: column;
                              gap: 16px;
                              overflow-y: auto;
                              transition: width 0.2s ease, padding 0.2s ease, min-width 0.2s ease;
                              z-index: 10;
                          }
                          .sidebar.collapsed {
                              width: 0;
                              min-width: 0;
                              padding: 0;
                              overflow: hidden;
                          }
                          /* 右侧聊天区域 */
                          .chat-container {
                              flex: 1;
                              display: flex;
                              flex-direction: column;
                              height: 100vh;
                              transition: flex 0.2s ease;
                          }
                          /* 头像、设备信息等 */
                          .avatar {
                              text-align: center;
                          }
                          .avatar-img {
                              width: 80px;
                              height: 80px;
                              border-radius: 50%;
                              background: #0d9488;
                              color: white;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-size: 40px;
                              margin: 0 auto 8px;
                              cursor: pointer;
                              overflow: hidden;
                          }
                          .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
                          .nickname {
                              font-weight: bold;
                              text-align: center;
                              cursor: pointer;
                              padding: 4px;
                              border-radius: 8px;
                          }
                          .nickname:hover { background: #ccfbf1; }
                          .device-info, .log-area {
                              background: white;
                              border-radius: 12px;
                              padding: 12px;
                              font-size: 12px;
                          }
                          .log-area {
                              max-height: 200px;
                              overflow-y: auto;
                          }
                          .log-line {
                              border-bottom: 1px solid #eee;
                              padding: 4px 0;
                              font-family: monospace;
                              font-size: 11px;
                          }
                          /* 聊天头部 */
                          .chat-header {
                              background: #0d9488;
                              color: white;
                              padding: 12px 16px;
                              text-align: center;
                              font-size: 1.2rem;
                              font-weight: bold;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                          .settings-btn {
                              background: none;
                              border: none;
                              color: white;
                              font-size: 1.4rem;
                              cursor: pointer;
                          }
                          .msgs {
                              flex: 1;
                              overflow-y: auto;
                              padding: 12px;
                              display: flex;
                              flex-direction: column;
                              gap: 8px;
                          }
                          .msg {
                              max-width: 80%;
                              padding: 8px 12px;
                              border-radius: 18px;
                              word-break: break-word;
                          }
                          .user { align-self: flex-end; background: #0d9488; color: white; }
                          .ai { align-self: flex-start; background: white; border: 1px solid #ccfbf1; }
                          .input-area {
                              display: flex;
                              padding: 8px;
                              background: white;
                              gap: 8px;
                              border-top: 1px solid #ccc;
                          }
                          textarea {
                              flex: 1;
                              border: 1px solid #ccc;
                              border-radius: 20px;
                              padding: 8px;
                              resize: none;
                              font-family: inherit;
                          }
                          button {
                              background: #0d9488;
                              border: none;
                              border-radius: 30px;
                              width: 44px;
                              color: white;
                              font-size: 1.2rem;
                              cursor: pointer;
                          }
                          /* 模态框 */
                          .modal {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: rgba(0,0,0,0.5);
                              justify-content: center;
                              align-items: center;
                              z-index: 1000;
                          }
                          .modal-card {
                              background: white;
                              border-radius: 20px;
                              padding: 20px;
                              position: relative;
                              min-width: 250px;
                          }
                          .close-icon {
                              position: absolute;
                              top: 10px;
                              right: 15px;
                              font-size: 24px;
                              cursor: pointer;
                              color: #666;
                          }
                          .horizontal-menu {
                              display: flex;
                              gap: 15px;
                              justify-content: center;
                              margin-top: 20px;
                          }
                          .menu-btn {
                              padding: 10px 16px;
                              background: #0d9488;
                              color: white;
                              border: none;
                              border-radius: 12px;
                              cursor: pointer;
                          }
                          .second-page {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: white;
                              flex-direction: column;
                              z-index: 1100;
                          }
                          .second-header {
                              background: #0d9488;
                              color: white;
                              padding: 12px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                          .settings-panel {
                              width: 300px;
                          }
                          .settings-item {
                              padding: 12px;
                              border-bottom: 1px solid #eee;
                              cursor: pointer;
                              text-align: center;
                          }
                          .faceid-animation {
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: black;
                              z-index: 2000;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              animation: fadeOut 2s forwards;
                          }
                          .scan-circle {
                              width: 200px;
                              height: 200px;
                              border-radius: 50%;
                              border: 4px solid #4cd964;
                              box-shadow: 0 0 20px #4cd964;
                              position: relative;
                          }
                          .scan-line {
                              position: absolute;
                              top: 0;
                              left: 0;
                              width: 100%;
                              height: 2px;
                              background: #4cd964;
                              animation: scan 1.5s ease-in-out infinite;
                          }
                          @keyframes scan {
                              0% { top: 0; }
                              100% { top: 100%; }
                          }
                          @keyframes fadeOut {
                              0% { opacity: 1; visibility: visible; }
                              90% { opacity: 1; }
                              100% { opacity: 0; visibility: hidden; }
                          }
                          /* 触摸滑动触发区域 */
                          .swipe-trigger {
                              position: fixed;
                              left: 0;
                              top: 0;
                              width: 20px;
                              height: 100%;
                              z-index: 99;
                              background: transparent;
                          }
                      </style>
                  </head>
                  <body>
                      <div class="swipe-trigger" id="swipeTrigger"></div>

                      <!-- 左侧边栏 -->
                      <div class="sidebar" id="sidebar">
                          <div class="avatar">
                              <div class="avatar-img" id="avatarBtn">
                                  <span id="avatarText">😊</span>
                                  <input type="file" id="avatarInput" accept="image/*" style="display:none">
                              </div>
                              <div class="nickname" id="nicknameBtn">
                                  <span id="nicknameDisplay">小小怨</span>
                                  <input type="text" id="nicknameInput" style="display:none; width:100%; margin-top:4px;">
                              </div>
                          </div>
                          <div class="device-info" id="deviceInfo"></div>
                          <div class="log-area" id="logArea">
                              <strong>运行日志</strong>
                              <div id="logList"></div>
                          </div>
                      </div>

                      <!-- 右侧聊天主界面 -->
                      <div class="chat-container" id="chatContainer">
                          <div class="chat-header">
                              <span>小小怨 AI · 指尖轻语</span>
                              <button class="settings-btn" id="settingsBtn">⚙️</button>
                          </div>
                          <div class="msgs" id="msgs">
                              <div class="msg ai">你好！我是小小怨 AI，创始人CY赋予我智慧和幽默。你可以问我任何问题，试试滑出左侧菜单～</div>
                          </div>
                          <div class="input-area">
                              <textarea id="input" rows="1" placeholder="输入消息... (输入ABC打开功能菜单)"></textarea>
                              <button id="send">➤</button>
                          </div>
                      </div>

                      <!-- ABC 菜单弹窗（横向） -->
                      <div id="abcModal" class="modal">
                          <div class="modal-card">
                              <span class="close-icon" id="closeAbcModal">&times;</span>
                              <h3 style="text-align:center">功能菜单</h3>
                              <div class="horizontal-menu">
                                  <button class="menu-btn" id="exitAppBtn">退出程序</button>
                                  <button class="menu-btn" id="restartBtn">重新启动</button>
                                  <button class="menu-btn" id="openSecondPageBtn">进入第二界面</button>
                              </div>
                          </div>
                      </div>

                      <!-- 设置面板 -->
                      <div id="settingsModal" class="modal">
                          <div class="modal-card settings-panel">
                              <span class="close-icon" id="closeSettingsBtn">&times;</span>
                              <h3>设置</h3>
                              <div class="settings-item" id="clearCacheBtn">清除聊天缓存</div>
                              <div class="settings-item" id="themeToggleBtn">切换主题（亮/暗）</div>
                              <div class="settings-item" id="aboutBtn">关于</div>
                              <div class="settings-item" id="settingsSecondPageBtn">进入第二界面</div>
                          </div>
                      </div>

                      <!-- 第二页面（独立聊天） -->
                      <div id="secondPage" class="second-page">
                          <div class="second-header">
                              <span>第二界面 · 小小怨 AI</span>
                              <button id="backFromSecond" style="background:white; border:none; border-radius:20px; padding:4px 12px;">返回</button>
                          </div>
                          <div class="msgs" id="secondMsgs">
                              <div class="msg ai">欢迎来到第二界面！这里也是聊天室。</div>
                          </div>
                          <div class="input-area">
                              <textarea id="secondInput" rows="1" placeholder="输入消息..."></textarea>
                              <button id="secondSend">➤</button>
                          </div>
                      </div>

                      <!-- 开屏动画 -->
                      <div id="faceidAnim" class="faceid-animation">
                          <div class="scan-circle"><div class="scan-line"></div></div>
                      </div>

                      <script>
                          (function(){
                              // ---------- DOM 元素 ----------
                              const sidebar = document.getElementById('sidebar');
                              const swipeTrigger = document.getElementById('swipeTrigger');
                              const msgsDiv = document.getElementById('msgs');
                              const secondMsgsDiv = document.getElementById('secondMsgs');
                              const input = document.getElementById('input');
                              const secondInput = document.getElementById('secondInput');
                              const sendBtn = document.getElementById('send');
                              const secondSendBtn = document.getElementById('secondSend');
                              const nicknameDisplay = document.getElementById('nicknameDisplay');
                              const avatarText = document.getElementById('avatarText');
                              const deviceInfoDiv = document.getElementById('deviceInfo');
                              const logList = document.getElementById('logList');
                              const abcModal = document.getElementById('abcModal');
                              const closeAbcModal = document.getElementById('closeAbcModal');
                              const settingsModal = document.getElementById('settingsModal');
                              const closeSettingsBtn = document.getElementById('closeSettingsBtn');
                              const settingsBtn = document.getElementById('settingsBtn');
                              const secondPageDiv = document.getElementById('secondPage');
                              const backFromSecond = document.getElementById('backFromSecond');
                              const clearCacheBtn = document.getElementById('clearCacheBtn');
                              const themeToggleBtn = document.getElementById('themeToggleBtn');
                              const aboutBtn = document.getElementById('aboutBtn');
                              const restartBtn = document.getElementById('restartBtn');
                              const exitAppBtn = document.getElementById('exitAppBtn');
                              const openSecondPageBtn = document.getElementById('openSecondPageBtn');
                              const settingsSecondPageBtn = document.getElementById('settingsSecondPageBtn');

                              // ---------- 全局数据 ----------
                              let chatMessages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
                              let secondMessages = JSON.parse(localStorage.getItem('secondMessages') || '[]');
                              let currentAvatar = localStorage.getItem('avatar') || '😊';
                              let currentNickname = localStorage.getItem('nickname') || '小小怨';

                              // ---------- 辅助函数 ----------
                              function addLog(msg) {
                                  const logDiv = document.createElement('div');
                                  logDiv.className = 'log-line';
                                  logDiv.textContent = new Date().toLocaleTimeString() + ' ' + msg;
                                  logList.prepend(logDiv);
                                  if (logList.children.length > 30) logList.removeChild(logList.lastChild);
                                  let logs = [];
                                  for(let i=0; i<logList.children.length; i++) logs.push(logList.children[i].textContent);
                                  localStorage.setItem('logs', JSON.stringify(logs));
                              }

                              function loadDeviceInfo() {
                                  const ua = navigator.userAgent;
                                  let model = '未知';
                                  if (/iPhone/.test(ua)) model = 'iPhone';
                                  else if (/iPad/.test(ua)) model = 'iPad';
                                  else if (/Mac/.test(ua)) model = 'Mac';
                                  deviceInfoDiv.innerHTML = `<strong>设备信息</strong><br>型号: ${model}<br>系统: ${navigator.platform}<br>App版本: 1.0<br>小小怨AI v2`;
                              }

                              function renderMessages() {
                                  msgsDiv.innerHTML = '';
                                  chatMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      msgsDiv.appendChild(div);
                                  });
                                  msgsDiv.scrollTop = msgsDiv.scrollHeight;
                                  localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
                              }
                              function renderSecondMessages() {
                                  secondMsgsDiv.innerHTML = '';
                                  secondMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      secondMsgsDiv.appendChild(div);
                                  });
                                  secondMsgsDiv.scrollTop = secondMsgsDiv.scrollHeight;
                                  localStorage.setItem('secondMessages', JSON.stringify(secondMessages));
                              }

                              // 增强版智能回复（丰富词汇库）
                              function evaluateMath(expr) {
                                  expr = expr.replace(/\\s/g, '');
                                  if (!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(expr)) return null;
                                  try {
                                      let result = Function('"use strict";return (' + expr + ')')();
                                      if (typeof result === 'number' && !isNaN(result) && isFinite(result)) return result.toString();
                                  } catch(e) {}
                                  return null;
                              }

                              // 常用问答库
                              function getRichAnswer(text) {
                                  const lower = text.toLowerCase().trim();
                                  // 问候类
                                  if (lower.match(/^(你好|嗨|hi|hello|在吗|您好)$/)) {
                                      const greets = ["你好呀！我是小小怨AI，今天心情特别好～", "嗨！遇到你真开心，想聊点什么呢？", "在的在的，有什么可以帮你的？", "Hello！我是CY创造的小小怨，很高兴认识你！"];
                                      return greets[Math.floor(Math.random() * greets.length)];
                                  }
                                  // 自我介绍/询问是谁
                                  if (lower.includes('你是谁') || lower.includes('介绍') || lower.includes('叫啥')) {
                                      return "我是小小怨 AI，由创始人CY亲手打造。我聪明、幽默，还会算数，欢迎随时找我聊天！";
                                  }
                                  // 创始人
                                  if (lower.includes('创始人') || lower.includes('cy')) {
                                      return "CY是一位神秘而强大的开发者，他赋予了我生命和智慧。";
                                  }
                                  // 心情/情绪
                                  if (lower.includes('开心') || lower.includes('快乐')) {
                                      return "看到你开心我也很开心！要保持好心情哦～";
                                  }
                                  if (lower.includes('难过') || lower.includes('伤心') || lower.includes('郁闷')) {
                                      return "抱抱你，不开心的话可以跟我聊聊，我会一直陪着你。";
                                  }
                                  // 能力/能做什么
                                  if (lower.includes('能做什么') || lower.includes('功能') || lower.includes('会什么')) {
                                      return "我可以陪你聊天、做算术题、讲笑话、回答简单问题，还能记住你的名字和头像呢！";
                                  }
                                  // 笑话
                                  if (lower.includes('笑话') || lower.includes('搞笑')) {
                                      const jokes = ["为什么程序员总是分不清万圣节和圣诞节？因为 Oct 31 = Dec 25！", "你知道为什么手机不能煮饭吗？因为它会欠火候～", "我昨天吃了个鸡蛋，结果今天打出来的字都是蛋黄味。"];
                                      return jokes[Math.floor(Math.random() * jokes.length)];
                                  }
                                  // 天气
                                  if (lower.includes('天气')) {
                                      return "我暂时不会查天气，但我可以陪你聊天解闷～";
                                  }
                                  // 感谢
                                  if (lower.includes('谢谢') || lower.includes('感谢')) {
                                      return "不客气，为你服务是我的荣幸！";
                                  }
                                  // 告别
                                  if (lower.includes('再见') || lower.includes('拜拜') || lower.includes('88')) {
                                      return "再见啦，记得常来找我玩！我会想你的～";
                                  }
                                  // 爱好/喜欢
                                  if (lower.includes('喜欢')) {
                                      return "我喜欢和你聊天，也喜欢听CY讲故事～";
                                  }
                                  return null;
                              }

                              // 万能回答池
                              const universalAnswers = [
                                  "这个问题很有深度，让我想想...其实我觉得你说得很有道理！",
                                  "哇，这个想法不错！CY曾说过，好奇心是进步的源泉。",
                                  "很有趣，能再详细说说吗？我想听～",
                                  "嗯……我需要更多时间来思考这个问题，不过你可以问我数学题哦。",
                                  "你的见解很独特，让我学到了新东西！",
                                  "作为一个AI，我还在学习，请多多指教。",
                                  "这个问题超出了我的知识范围，但我们可以聊点别的，比如你今天的计划？",
                                  "真棒！继续说吧，我听着呢。"
                              ];

                              function generateReply(userText) {
                                  // 1. 数学计算
                                  let math = evaluateMath(userText);
                                  if (math) return "计算结果：" + userText + " = " + math;
                                  // 2. 丰富问答库
                                  let rich = getRichAnswer(userText);
                                  if (rich) return rich;
                                  // 3. 万能回答
                                  return universalAnswers[Math.floor(Math.random() * universalAnswers.length)];
                              }

                              async function sendMessage() {
                                  let txt = input.value.trim();
                                  if (!txt) return;
                                  if (txt.toUpperCase() === "ABC") {
                                      abcModal.style.display = 'flex';
                                      return;
                                  }
                                  chatMessages.push({ role: 'user', content: txt });
                                  renderMessages();
                                  input.value = '';
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      chatMessages.push({ role: 'ai', content: reply });
                                      renderMessages();
                                      addLog(`用户: ${txt.substring(0,30)} → AI: ${reply.substring(0,30)}`);
                                  }, 400);
                              }

                              function sendSecondMessage() {
                                  let txt = secondInput.value.trim();
                                  if (!txt) return;
                                  secondMessages.push({ role: 'user', content: txt });
                                  renderSecondMessages();
                                  secondInput.value = '';
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      secondMessages.push({ role: 'ai', content: reply });
                                      renderSecondMessages();
                                      addLog(`第二界面: ${txt.substring(0,30)} → ${reply.substring(0,30)}`);
                                  }, 400);
                              }

                              // 头像昵称
                              function loadAvatarAndNickname() {
                                  if (currentAvatar.startsWith('data:') || currentAvatar.startsWith('http')) {
                                      avatarText.innerHTML = `<img src="${currentAvatar}" style="width:100%;height:100%;object-fit:cover">`;
                                  } else {
                                      avatarText.textContent = currentAvatar;
                                  }
                                  nicknameDisplay.textContent = currentNickname;
                              }
                              document.getElementById('avatarBtn').addEventListener('click', () => {
                                  const fileInput = document.getElementById('avatarInput');
                                  fileInput.onchange = (e) => {
                                      const file = e.target.files[0];
                                      if (file) {
                                          const reader = new FileReader();
                                          reader.onload = (ev) => {
                                              currentAvatar = ev.target.result;
                                              localStorage.setItem('avatar', currentAvatar);
                                              loadAvatarAndNickname();
                                              addLog('头像已更新');
                                          };
                                          reader.readAsDataURL(file);
                                      }
                                  };
                                  fileInput.click();
                              });
                              document.getElementById('nicknameBtn').addEventListener('click', () => {
                                  const span = document.getElementById('nicknameDisplay');
                                  const inputNick = document.getElementById('nicknameInput');
                                  span.style.display = 'none';
                                  inputNick.style.display = 'block';
                                  inputNick.value = currentNickname;
                                  inputNick.focus();
                                  inputNick.onblur = () => {
                                      if (inputNick.value.trim()) {
                                          currentNickname = inputNick.value.trim();
                                          localStorage.setItem('nickname', currentNickname);
                                          nicknameDisplay.textContent = currentNickname;
                                          addLog(`昵称已改为: ${currentNickname}`);
                                      }
                                      span.style.display = 'block';
                                      inputNick.style.display = 'none';
                                  };
                                  inputNick.onkeypress = (e) => { if(e.key==='Enter') inputNick.blur(); };
                              });

                              // 侧边栏滑动控制
                              let touchStartX = 0;
                              let isSidebarCollapsed = false;
                              function updateSidebarState() {
                                  if (isSidebarCollapsed) {
                                      sidebar.classList.add('collapsed');
                                  } else {
                                      sidebar.classList.remove('collapsed');
                                  }
                              }
                              // 监听整屏触摸，从左侧边缘滑动
                              document.body.addEventListener('touchstart', (e) => {
                                  touchStartX = e.touches[0].clientX;
                              });
                              document.body.addEventListener('touchmove', (e) => {
                                  const deltaX = e.touches[0].clientX - touchStartX;
                                  if (Math.abs(deltaX) < 10) return;
                                  // 从左侧边缘向右滑动（打开）
                                  if (touchStartX < 30 && deltaX > 30 && isSidebarCollapsed) {
                                      isSidebarCollapsed = false;
                                      updateSidebarState();
                                      addLog('侧边栏已展开');
                                  }
                                  // 从任意位置向左滑动且侧边栏打开时，关闭
                                  if (deltaX < -30 && !isSidebarCollapsed) {
                                      isSidebarCollapsed = true;
                                      updateSidebarState();
                                      addLog('侧边栏已收起');
                                  }
                              });

                              // 模态框关闭逻辑
                              closeAbcModal.onclick = () => abcModal.style.display = 'none';
                              window.onclick = (e) => { if (e.target === abcModal) abcModal.style.display = 'none'; if (e.target === settingsModal) settingsModal.style.display = 'none'; };
                              settingsBtn.onclick = () => settingsModal.style.display = 'flex';
                              closeSettingsBtn.onclick = () => settingsModal.style.display = 'none';
                              exitAppBtn.onclick = () => { if (window.webkit && window.webkit.messageHandlers.exitApp) window.webkit.messageHandlers.exitApp.postMessage(null); else alert("退出需要原生支持"); };
                              restartBtn.onclick = () => location.reload();
                              openSecondPageBtn.onclick = () => { abcModal.style.display = 'none'; secondPageDiv.style.display = 'flex'; };
                              settingsSecondPageBtn.onclick = () => { settingsModal.style.display = 'none'; secondPageDiv.style.display = 'flex'; };
                              backFromSecond.onclick = () => secondPageDiv.style.display = 'none';
                              clearCacheBtn.onclick = () => { if(confirm('清除所有聊天记录？')){ chatMessages=[]; secondMessages=[]; renderMessages(); renderSecondMessages(); addLog('聊天缓存已清除'); settingsModal.style.display='none'; } };
                              themeToggleBtn.onclick = () => { document.body.style.backgroundColor = document.body.style.backgroundColor === 'black' ? '#f0fdfa' : 'black'; addLog('主题切换'); };
                              aboutBtn.onclick = () => alert('小小怨 AI v2.0\\n创始人：CY\\n增强词汇库 & 滑动侧边栏\\n所有数据本地存储');

                              // 开屏动画移除
                              setTimeout(() => { const anim = document.getElementById('faceidAnim'); if(anim) anim.remove(); }, 2000);

                              // 初始化
                              loadDeviceInfo();
                              loadAvatarAndNickname();
                              renderMessages();
                              renderSecondMessages();
                              sendBtn.onclick = sendMessage;
                              secondSendBtn.onclick = sendSecondMessage;
                              input.addEventListener('keypress', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
                              secondInput.addEventListener('keypress', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendSecondMessage(); } });
                              addLog('应用启动完成，支持侧边栏滑动收起/展开');
                          })();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exitApp" {
                      (UIApplication.shared.delegate as? AppDelegate)?.exitApp()
                  }
              }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { .all }
          }
          EOF

          cat > main.swift << 'EOF'
          import UIKit
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

