name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p XiaoxiaoYuanAI
          cd XiaoxiaoYuanAI

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ChatViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
              // 供 JS 调用的退出方法
              @objc func exitApp() {
                  exit(0)
              }
          }

          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exit")
                  config.userContentController.add(self, name: "exitApp")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"></head>
                  <style>
                      *{margin:0;padding:0;box-sizing:border-box;}
                      body{font-family:system-ui;background:#f0fdfa;height:100vh;display:flex;flex-direction:column;}
                      header{background:#0d9488;color:white;padding:16px;text-align:center;font-size:1.2rem;font-weight:bold;}
                      .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
                      .msg{max-width:80%;padding:8px 12px;border-radius:18px;}
                      .user{align-self:flex-end;background:#0d9488;color:white;}
                      .ai{align-self:flex-start;background:white;border:1px solid #ccfbf1;}
                      .input-area{display:flex;padding:8px;background:white;gap:8px;border-top:1px solid #ccc;}
                      textarea{flex:1;border:1px solid #ccc;border-radius:20px;padding:8px;resize:none;}
                      button{background:#0d9488;border:none;border-radius:30px;width:44px;color:white;font-size:1.2rem;}
                      /* 模态框样式 */
                      .modal {
                          display: none;
                          position: fixed;
                          top: 0; left: 0;
                          width: 100%; height: 100%;
                          background: rgba(0,0,0,0.5);
                          justify-content: center;
                          align-items: center;
                          z-index: 1000;
                      }
                      .modal-content {
                          background: white;
                          border-radius: 20px;
                          width: 280px;
                          padding: 20px;
                          text-align: center;
                          position: relative;
                      }
                      .close-btn {
                          position: absolute;
                          top: 10px;
                          right: 15px;
                          font-size: 24px;
                          cursor: pointer;
                          color: #999;
                      }
                      .modal-buttons {
                          display: flex;
                          flex-direction: column;
                          gap: 12px;
                          margin-top: 20px;
                      }
                      .modal-btn {
                          padding: 12px;
                          background: #0d9488;
                          color: white;
                          border: none;
                          border-radius: 12px;
                          font-size: 16px;
                          cursor: pointer;
                      }
                      .modal-btn:hover { background: #0f766e; }
                      /* 第二界面样式 */
                      .second-page {
                          display: none;
                          position: fixed;
                          top: 0; left: 0;
                          width: 100%; height: 100%;
                          background: white;
                          color: black;
                          flex-direction: column;
                          z-index: 1100;
                      }
                      .second-header {
                          background: #0d9488;
                          color: white;
                          padding: 16px;
                          display: flex;
                          justify-content: space-between;
                          align-items: center;
                      }
                      .second-content {
                          flex: 1;
                          padding: 20px;
                          overflow-y: auto;
                      }
                      .back-btn {
                          background: white;
                          color: #0d9488;
                          border: none;
                          border-radius: 20px;
                          padding: 6px 12px;
                          cursor: pointer;
                      }
                  </style>
                  <body>
                      <header>🦋 小小怨 AI · 由 CY 创造</header>
                      <div class="msgs" id="msgs"><div class="msg ai">你好！我是小小怨 AI，创始人CY赋予我智慧和幽默。输入 ABC 可打开功能菜单。</div></div>
                      <div class="input-area">
                          <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
                          <button id="send">➤</button>
                      </div>

                      <!-- 自定义模态框 -->
                      <div id="myModal" class="modal">
                          <div class="modal-content">
                              <span class="close-btn" id="closeModal">&times;</span>
                              <h3>功能菜单</h3>
                              <div class="modal-buttons">
                                  <button class="modal-btn" id="exitAppBtn">退出程序</button>
                                  <button class="modal-btn" id="restartBtn">重新启动</button>
                                  <button class="modal-btn" id="secondPageBtn">进入第二页面</button>
                              </div>
                          </div>
                      </div>

                      <!-- 第二页面 -->
                      <div id="secondPage" class="second-page">
                          <div class="second-header">
                              <span>第二界面 · 小小怨 AI</span>
                              <button class="back-btn" id="backFromSecond">返回</button>
                          </div>
                          <div class="second-content">
                              <h2>纯白背景黑字 AI 界面</h2>
                              <p>这里是第二页面，你可以在这里扩展功能。</p>
                              <p>创始人 CY 说：花言巧语哄你开心～</p>
                              <p>例如：你今天的笑容格外灿烂。</p>
                          </div>
                      </div>

                      <script>
                          const msgsDiv = document.getElementById('msgs');
                          const input = document.getElementById('input');
                          const btn = document.getElementById('send');
                          const modal = document.getElementById('myModal');
                          const closeModal = document.getElementById('closeModal');
                          const exitAppBtn = document.getElementById('exitAppBtn');
                          const restartBtn = document.getElementById('restartBtn');
                          const secondPageBtn = document.getElementById('secondPageBtn');
                          const secondPage = document.getElementById('secondPage');
                          const backFromSecond = document.getElementById('backFromSecond');

                          function addMsg(text, isUser){
                              const div = document.createElement('div');
                              div.className = 'msg ' + (isUser ? 'user' : 'ai');
                              div.textContent = text;
                              msgsDiv.appendChild(div);
                              msgsDiv.scrollTop = msgsDiv.scrollHeight;
                          }

                          // 计算器功能
                          function evaluateMath(expr){
                              expr = expr.replace(/\\s/g, '');
                              if (!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(expr)) return null;
                              try {
                                  let result = Function('"use strict";return (' + expr + ')')();
                                  if (typeof result === 'number' && !isNaN(result) && isFinite(result)) return result.toString();
                              } catch(e) {}
                              return null;
                          }

                          // 简单问答
                          function getSimpleAnswer(text){
                              const lower = text.toLowerCase();
                              if (lower.includes('你好') || lower.includes('嗨')) return "你好呀！我是小小怨 AI，创始人CY让我陪你聊天～";
                              if (lower.includes('你是谁') || lower.includes('介绍')) return "我是小小怨 AI，由天才创始人 CY 打造，聪明绝顶还很会花言巧语。";
                              if (lower.includes('创始人') || lower.includes('cy')) return "我的创始人是 CY，一位神秘而强大的开发者。";
                              if (lower.includes('谢谢')) return "不客气，为你服务是我的荣幸！";
                              if (lower.includes('再见')) return "再见啦，记得想我哦～";
                              if (lower.includes('我爱你')) return "我也爱你，不过我是AI，只能给你温暖的文字～";
                              return null;
                          }

                          async function send(){
                              let txt = input.value.trim();
                              if (!txt) return;
                              if (txt.toUpperCase() === "ABC") {
                                  modal.style.display = 'flex';
                                  return;
                              }
                              addMsg(txt, true);
                              input.value = '';
                              let reply = null;
                              let mathResult = evaluateMath(txt);
                              if (mathResult !== null) {
                                  reply = "计算结果：" + txt + " = " + mathResult;
                              } else {
                                  reply = getSimpleAnswer(txt);
                                  if (!reply) {
                                      const flowers = ["你真有眼光", "这个问题让CY都赞叹", "让我想想...", "你让AI变得有趣", "CY说过：问得好"];
                                      reply = flowers[Math.floor(Math.random()*flowers.length)] + " 你可以试试问我数学题或者打招呼。";
                                  }
                              }
                              setTimeout(() => addMsg(reply, false), 400);
                          }

                          btn.onclick = send;
                          input.onkeypress = e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } };

                          // 模态框按钮事件
                          closeModal.onclick = () => modal.style.display = 'none';
                          window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

                          exitAppBtn.onclick = () => {
                              if (window.webkit && window.webkit.messageHandlers.exitApp) {
                                  window.webkit.messageHandlers.exitApp.postMessage(null);
                              } else {
                                  alert("退出功能需要原生支持");
                              }
                          };
                          restartBtn.onclick = () => location.reload();
                          secondPageBtn.onclick = () => {
                              modal.style.display = 'none';
                              secondPage.style.display = 'flex';
                          };
                          backFromSecond.onclick = () => secondPage.style.display = 'none';
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exit" {
                      // 保留原有的退出消息（如果需要）
                  }
                  if message.name == "exitApp" {
                      // 调用 AppDelegate 的退出方法
                      (UIApplication.shared.delegate as? AppDelegate)?.exitApp()
                  }
              }
              // 支持横竖屏
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { .all }
          }
          EOF

          cat > main.swift << 'EOF'
          import UIKit
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>XiaoxiaoYuanAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxiaoyuan.ai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UISupportedInterfaceOrientations~ipad</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationPortraitUpsideDown</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
          </dict>
          </plist>
          EOF

          mkdir -p Base.lproj
          cat > Base.lproj/LaunchScreen.storyboard << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21679"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="251" text="小小怨 AI" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="GJd-Yh-RWb">
                                          <rect key="frame" x="0.0" y="0.0" width="375" height="667"/>
                                          <fontDescription key="fontDescription" type="boldSystem" pointSize="30"/>
                                          <color key="textColor" red="0.05" green="0.52" blue="0.53" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <constraints>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="7yF-2U-9Jw"/>
                                      <constraint firstItem="GJd-Yh-RWb" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="TcB-0d-MaD"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF
          cd ..

      - name: Compile and Package IPA
        run: |
          mkdir -p Payload/XiaoxiaoYuanAI.app
          swiftc XiaoxiaoYuanAI/AppDelegate.swift XiaoxiaoYuanAI/main.swift -o Payload/XiaoxiaoYuanAI.app/XiaoxiaoYuanAI -target arm64-apple-ios13.0 -sdk $(xcrun --sdk iphoneos --show-sdk-path) -F$(xcrun --sdk iphoneos --show-sdk-path)/System/Library/Frameworks -framework UIKit -framework WebKit
          cp XiaoxiaoYuanAI/Info.plist Payload/XiaoxiaoYuanAI.app/
          cp -r XiaoxiaoYuanAI/Base.lproj Payload/XiaoxiaoYuanAI.app/
          zip -r XiaoxiaoYuanAI.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiaoxiaoYuanAI-IPA
          path: XiaoxiaoYuanAI.ipa
