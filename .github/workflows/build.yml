name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Create iOS App
        run: |
          mkdir -p XiaoxiaoYuanAI
          cd XiaoxiaoYuanAI

          cat > AppDelegate.swift << 'EOF'
          import UIKit
          import WebKit

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = ChatViewController()
                  window?.rootViewController = vc
                  window?.makeKeyAndVisible()
                  return true
              }
              @objc func exitApp() {
                  exit(0)
              }
          }

          class ChatViewController: UIViewController, WKScriptMessageHandler {
              var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  let config = WKWebViewConfiguration()
                  config.userContentController.add(self, name: "exitApp")
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  view.addSubview(webView)
                  let html = """
                  <!DOCTYPE html>
                  <html>
                  <head>
                      <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
                      <style>
                          * { margin: 0; padding: 0; box-sizing: border-box; }
                          body { font-family: system-ui; background: #f0fdfa; height: 100vh; overflow: hidden; display: flex; }
                          /* 左侧边栏 20% */
                          .sidebar {
                              width: 20%;
                              background: #e2f5f3;
                              border-right: 1px solid #ccc;
                              padding: 16px;
                              display: flex;
                              flex-direction: column;
                              gap: 16px;
                              overflow-y: auto;
                          }
                          .avatar {
                              text-align: center;
                          }
                          .avatar-img {
                              width: 80px;
                              height: 80px;
                              border-radius: 50%;
                              background: #0d9488;
                              color: white;
                              display: flex;
                              align-items: center;
                              justify-content: center;
                              font-size: 32px;
                              margin: 0 auto 8px;
                              cursor: pointer;
                              overflow: hidden;
                          }
                          .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
                          .nickname {
                              font-weight: bold;
                              text-align: center;
                              cursor: pointer;
                              padding: 4px;
                              border-radius: 8px;
                          }
                          .nickname:hover { background: #ccfbf1; }
                          .device-info, .log-area {
                              background: white;
                              border-radius: 12px;
                              padding: 12px;
                              font-size: 12px;
                          }
                          .log-area {
                              max-height: 200px;
                              overflow-y: auto;
                          }
                          .log-line {
                              border-bottom: 1px solid #eee;
                              padding: 4px 0;
                              font-family: monospace;
                          }
                          /* 右侧聊天区域 80% */
                          .chat-container {
                              width: 80%;
                              display: flex;
                              flex-direction: column;
                              height: 100vh;
                              position: relative;
                          }
                          .chat-header {
                              background: #0d9488;
                              color: white;
                              padding: 12px 16px;
                              text-align: center;
                              font-size: 1.2rem;
                              font-weight: bold;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                          .settings-btn {
                              background: none;
                              border: none;
                              color: white;
                              font-size: 1.4rem;
                              cursor: pointer;
                          }
                          .msgs {
                              flex: 1;
                              overflow-y: auto;
                              padding: 12px;
                              display: flex;
                              flex-direction: column;
                              gap: 8px;
                          }
                          .msg {
                              max-width: 80%;
                              padding: 8px 12px;
                              border-radius: 18px;
                          }
                          .user { align-self: flex-end; background: #0d9488; color: white; }
                          .ai { align-self: flex-start; background: white; border: 1px solid #ccfbf1; }
                          .input-area {
                              display: flex;
                              padding: 8px;
                              background: white;
                              gap: 8px;
                              border-top: 1px solid #ccc;
                          }
                          textarea {
                              flex: 1;
                              border: 1px solid #ccc;
                              border-radius: 20px;
                              padding: 8px;
                              resize: none;
                          }
                          button {
                              background: #0d9488;
                              border: none;
                              border-radius: 30px;
                              width: 44px;
                              color: white;
                              font-size: 1.2rem;
                              cursor: pointer;
                          }
                          /* 模态框通用 */
                          .modal {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: rgba(0,0,0,0.5);
                              justify-content: center;
                              align-items: center;
                              z-index: 1000;
                          }
                          .modal-card {
                              background: white;
                              border-radius: 20px;
                              padding: 20px;
                              position: relative;
                              min-width: 250px;
                          }
                          .close-icon {
                              position: absolute;
                              top: 10px;
                              right: 15px;
                              font-size: 24px;
                              cursor: pointer;
                              color: #666;
                          }
                          /* 横向菜单 */
                          .horizontal-menu {
                              display: flex;
                              gap: 15px;
                              justify-content: center;
                              margin-top: 20px;
                          }
                          .menu-btn {
                              padding: 10px 16px;
                              background: #0d9488;
                              color: white;
                              border: none;
                              border-radius: 12px;
                              cursor: pointer;
                          }
                          /* 第二页面（全屏聊天） */
                          .second-page {
                              display: none;
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: white;
                              flex-direction: column;
                              z-index: 1100;
                          }
                          .second-header {
                              background: #0d9488;
                              color: white;
                              padding: 12px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                          }
                          .second-chat-area {
                              flex: 1;
                              display: flex;
                              flex-direction: column;
                              overflow-y: auto;
                          }
                          /* 设置面板 */
                          .settings-panel {
                              width: 300px;
                          }
                          .settings-item {
                              padding: 8px;
                              border-bottom: 1px solid #eee;
                              cursor: pointer;
                          }
                          /* 开屏动画 */
                          .faceid-animation {
                              position: fixed;
                              top: 0; left: 0;
                              width: 100%; height: 100%;
                              background: black;
                              z-index: 2000;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              animation: fadeOut 2s forwards;
                          }
                          .scan-circle {
                              width: 200px;
                              height: 200px;
                              border-radius: 50%;
                              border: 4px solid #4cd964;
                              box-shadow: 0 0 20px #4cd964;
                              position: relative;
                          }
                          .scan-line {
                              position: absolute;
                              top: 0;
                              left: 0;
                              width: 100%;
                              height: 2px;
                              background: #4cd964;
                              animation: scan 1.5s ease-in-out infinite;
                          }
                          @keyframes scan {
                              0% { top: 0; }
                              100% { top: 100%; }
                          }
                          @keyframes fadeOut {
                              0% { opacity: 1; visibility: visible; }
                              90% { opacity: 1; }
                              100% { opacity: 0; visibility: hidden; }
                          }
                      </style>
                  </head>
                  <body>
                      <!-- 开屏动画 -->
                      <div id="faceidAnim" class="faceid-animation">
                          <div class="scan-circle">
                              <div class="scan-line"></div>
                          </div>
                      </div>

                      <!-- 左侧边栏 20% -->
                      <div class="sidebar" id="sidebar">
                          <div class="avatar">
                              <div class="avatar-img" id="avatarBtn">
                                  <span id="avatarText">😊</span>
                                  <input type="file" id="avatarInput" accept="image/*" style="display:none">
                              </div>
                              <div class="nickname" id="nicknameBtn">
                                  <span id="nicknameDisplay">小小怨</span>
                                  <input type="text" id="nicknameInput" style="display:none; width:100%; margin-top:4px;">
                              </div>
                          </div>
                          <div class="device-info" id="deviceInfo"></div>
                          <div class="log-area" id="logArea">
                              <strong>运行日志</strong>
                              <div id="logList"></div>
                          </div>
                      </div>

                      <!-- 右侧聊天区 -->
                      <div class="chat-container">
                          <div class="chat-header">
                              <span>小小怨 AI · 由 CY 创造</span>
                              <button class="settings-btn" id="settingsBtn">⚙️</button>
                          </div>
                          <div class="msgs" id="msgs">
                              <div class="msg ai">你好！我是小小怨 AI，创始人CY赋予我智慧和幽默。你可以问我任何问题。</div>
                          </div>
                          <div class="input-area">
                              <textarea id="input" rows="1" placeholder="输入消息... (输入ABC打开功能菜单)"></textarea>
                              <button id="send">➤</button>
                          </div>
                      </div>

                      <!-- ABC 菜单弹窗（横向） -->
                      <div id="abcModal" class="modal">
                          <div class="modal-card">
                              <span class="close-icon" id="closeAbcModal">&times;</span>
                              <h3 style="text-align:center">功能菜单</h3>
                              <div class="horizontal-menu">
                                  <button class="menu-btn" id="exitAppBtn">退出程序</button>
                                  <button class="menu-btn" id="restartBtn">重新启动</button>
                                  <button class="menu-btn" id="openSecondPageBtn">进入第二界面</button>
                              </div>
                          </div>
                      </div>

                      <!-- 设置面板 -->
                      <div id="settingsModal" class="modal">
                          <div class="modal-card settings-panel">
                              <span class="close-icon" id="closeSettingsBtn">&times;</span>
                              <h3>设置</h3>
                              <div class="settings-item" id="clearCacheBtn">清除聊天缓存</div>
                              <div class="settings-item" id="themeToggleBtn">切换主题（亮/暗）</div>
                              <div class="settings-item" id="aboutBtn">关于</div>
                              <div class="settings-item" id="settingsSecondPageBtn">进入第二界面</div>
                          </div>
                      </div>

                      <!-- 第二页面（独立聊天） -->
                      <div id="secondPage" class="second-page">
                          <div class="second-header">
                              <span>第二界面 · 小小怨 AI</span>
                              <button id="backFromSecond" style="background:white; border:none; border-radius:20px; padding:4px 12px;">返回</button>
                          </div>
                          <div class="second-chat-area">
                              <div class="msgs" id="secondMsgs">
                                  <div class="msg ai">欢迎来到第二界面！这里也是聊天室，功能与主界面相同。</div>
                              </div>
                              <div class="input-area">
                                  <textarea id="secondInput" rows="1" placeholder="输入消息... (输入ABC无效，请返回主界面)"></textarea>
                                  <button id="secondSend">➤</button>
                              </div>
                          </div>
                      </div>

                      <script>
                          (function(){
                              // ---------- 全局变量 ----------
                              let currentAvatar = localStorage.getItem('avatar') || '😊';
                              let currentNickname = localStorage.getItem('nickname') || '小小怨';
                              let chatMessages = JSON.parse(localStorage.getItem('chatMessages') || '[]');
                              let secondMessages = JSON.parse(localStorage.getItem('secondMessages') || '[]');
                              const msgsDiv = document.getElementById('msgs');
                              const secondMsgsDiv = document.getElementById('secondMsgs');
                              const input = document.getElementById('input');
                              const secondInput = document.getElementById('secondInput');
                              const sendBtn = document.getElementById('send');
                              const secondSendBtn = document.getElementById('secondSend');
                              const nicknameDisplay = document.getElementById('nicknameDisplay');
                              const avatarText = document.getElementById('avatarText');
                              const deviceInfoDiv = document.getElementById('deviceInfo');
                              const logList = document.getElementById('logList');

                              // 辅助函数：添加日志
                              function addLog(msg) {
                                  const logDiv = document.createElement('div');
                                  logDiv.className = 'log-line';
                                  logDiv.textContent = new Date().toLocaleTimeString() + ' ' + msg;
                                  logList.prepend(logDiv);
                                  if (logList.children.length > 20) logList.removeChild(logList.lastChild);
                                  localStorage.setItem('logs', JSON.stringify(Array.from(logList.children).map(l => l.textContent)));
                              }

                              // 加载设备信息
                              function loadDeviceInfo() {
                                  const ua = navigator.userAgent;
                                  let model = '未知';
                                  if (/iPhone/.test(ua)) model = 'iPhone';
                                  else if (/iPad/.test(ua)) model = 'iPad';
                                  else if (/Mac/.test(ua)) model = 'Mac';
                                  deviceInfoDiv.innerHTML = `<strong>设备信息</strong><br>型号: ${model}<br>系统: ${navigator.platform}<br>App版本: 1.0<br>小小怨 AI`;
                              }

                              // 刷新聊天界面
                              function renderMessages() {
                                  msgsDiv.innerHTML = '';
                                  chatMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      msgsDiv.appendChild(div);
                                  });
                                  msgsDiv.scrollTop = msgsDiv.scrollHeight;
                                  localStorage.setItem('chatMessages', JSON.stringify(chatMessages));
                              }
                              function renderSecondMessages() {
                                  secondMsgsDiv.innerHTML = '';
                                  secondMessages.forEach(msg => {
                                      const div = document.createElement('div');
                                      div.className = 'msg ' + (msg.role === 'user' ? 'user' : 'ai');
                                      div.textContent = msg.content;
                                      secondMsgsDiv.appendChild(div);
                                  });
                                  secondMsgsDiv.scrollTop = secondMsgsDiv.scrollHeight;
                                  localStorage.setItem('secondMessages', JSON.stringify(secondMessages));
                              }

                              // 计算器
                              function evaluateMath(expr) {
                                  expr = expr.replace(/\\s/g, '');
                                  if (!/^[\\d\\+\\-\\*\\/\\.\\(\\)]+$/.test(expr)) return null;
                                  try {
                                      let result = Function('"use strict";return (' + expr + ')')();
                                      if (typeof result === 'number' && !isNaN(result) && isFinite(result)) return result.toString();
                                  } catch(e) {}
                                  return null;
                              }
                              // 简单问答 (仅在自我介绍时提CY，其他时候不提)
                              function getSimpleAnswer(text) {
                                  const lower = text.toLowerCase();
                                  if (lower.includes('你好') || lower.includes('嗨')) return "你好呀！我是小小怨 AI，有什么可以帮你的？";
                                  if (lower.includes('你是谁') || lower.includes('介绍')) return "我是小小怨 AI，由创始人 CY 打造。我会算数、能聊天，还能花言巧语～";
                                  if (lower.includes('创始人') || lower.includes('cy')) return "我的创始人是 CY，一位神秘而强大的开发者。";
                                  if (lower.includes('谢谢')) return "不客气，为你服务是我的荣幸！";
                                  if (lower.includes('再见')) return "再见啦，记得常来找我玩！";
                                  if (lower.includes('我爱你')) return "我也爱你，不过我是AI，只能给你温暖的文字～";
                                  return null;
                              }
                              // 生成回复
                              function generateReply(userText) {
                                  let math = evaluateMath(userText);
                                  if (math) return "计算结果：" + userText + " = " + math;
                                  let simple = getSimpleAnswer(userText);
                                  if (simple) return simple;
                                  const flowers = ["你真有眼光", "这个问题有趣", "让我想想...", "CY 说过：聪明的人喜欢提问", "你让AI变得更有趣了"];
                                  return flowers[Math.floor(Math.random()*flowers.length)] + " 你可以试试问我数学题或者打招呼。";
                              }

                              // 发送消息主界面
                              async function sendMessage() {
                                  let txt = input.value.trim();
                                  if (!txt) return;
                                  if (txt.toUpperCase() === "ABC") {
                                      document.getElementById('abcModal').style.display = 'flex';
                                      return;
                                  }
                                  // 添加用户消息
                                  chatMessages.push({ role: 'user', content: txt });
                                  renderMessages();
                                  input.value = '';
                                  // 模拟AI回复
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      chatMessages.push({ role: 'ai', content: reply });
                                      renderMessages();
                                      addLog(`用户: ${txt} -> AI: ${reply.substring(0,30)}`);
                                  }, 400);
                              }
                              // 第二界面发送
                              function sendSecondMessage() {
                                  let txt = secondInput.value.trim();
                                  if (!txt) return;
                                  secondMessages.push({ role: 'user', content: txt });
                                  renderSecondMessages();
                                  secondInput.value = '';
                                  setTimeout(() => {
                                      let reply = generateReply(txt);
                                      secondMessages.push({ role: 'ai', content: reply });
                                      renderSecondMessages();
                                      addLog(`第二界面: ${txt} -> ${reply.substring(0,30)}`);
                                  }, 400);
                              }

                              // 加载保存的头像和昵称
                              function loadAvatarAndNickname() {
                                  if (currentAvatar.startsWith('data:') || currentAvatar.startsWith('http')) {
                                      avatarText.innerHTML = `<img src="${currentAvatar}" style="width:100%;height:100%;object-fit:cover">`;
                                  } else {
                                      avatarText.textContent = currentAvatar;
                                  }
                                  nicknameDisplay.textContent = currentNickname;
                              }
                              // 修改头像
                              document.getElementById('avatarBtn').addEventListener('click', () => {
                                  const fileInput = document.getElementById('avatarInput');
                                  fileInput.onchange = (e) => {
                                      const file = e.target.files[0];
                                      if (file) {
                                          const reader = new FileReader();
                                          reader.onload = (ev) => {
                                              currentAvatar = ev.target.result;
                                              localStorage.setItem('avatar', currentAvatar);
                                              loadAvatarAndNickname();
                                              addLog('头像已更新');
                                          };
                                          reader.readAsDataURL(file);
                                      }
                                  };
                                  fileInput.click();
                              });
                              // 修改昵称
                              document.getElementById('nicknameBtn').addEventListener('click', () => {
                                  const span = document.getElementById('nicknameDisplay');
                                  const inputNick = document.getElementById('nicknameInput');
                                  span.style.display = 'none';
                                  inputNick.style.display = 'block';
                                  inputNick.value = currentNickname;
                                  inputNick.focus();
                                  inputNick.onblur = () => {
                                      if (inputNick.value.trim()) {
                                          currentNickname = inputNick.value.trim();
                                          localStorage.setItem('nickname', currentNickname);
                                          nicknameDisplay.textContent = currentNickname;
                                          addLog(`昵称已改为: ${currentNickname}`);
                                      }
                                      span.style.display = 'block';
                                      inputNick.style.display = 'none';
                                  };
                                  inputNick.onkeypress = (e) => { if(e.key==='Enter') inputNick.blur(); };
                              });

                              // 模态框控制
                              const abcModal = document.getElementById('abcModal');
                              const closeAbcModal = document.getElementById('closeAbcModal');
                              const settingsModal = document.getElementById('settingsModal');
                              const closeSettingsBtn = document.getElementById('closeSettingsBtn');
                              const settingsBtn = document.getElementById('settingsBtn');
                              closeAbcModal.onclick = () => abcModal.style.display = 'none';
                              window.onclick = (e) => { if (e.target === abcModal) abcModal.style.display = 'none'; if (e.target === settingsModal) settingsModal.style.display = 'none'; };
                              settingsBtn.onclick = () => settingsModal.style.display = 'flex';
                              closeSettingsBtn.onclick = () => settingsModal.style.display = 'none';

                              // 菜单按钮
                              document.getElementById('exitAppBtn').onclick = () => {
                                  if (window.webkit && window.webkit.messageHandlers.exitApp) {
                                      window.webkit.messageHandlers.exitApp.postMessage(null);
                                  } else { alert("退出功能需要原生支持"); }
                              };
                              document.getElementById('restartBtn').onclick = () => location.reload();
                              const secondPageDiv = document.getElementById('secondPage');
                              const backFromSecond = document.getElementById('backFromSecond');
                              document.getElementById('openSecondPageBtn').onclick = () => {
                                  abcModal.style.display = 'none';
                                  secondPageDiv.style.display = 'flex';
                              };
                              document.getElementById('settingsSecondPageBtn').onclick = () => {
                                  settingsModal.style.display = 'none';
                                  secondPageDiv.style.display = 'flex';
                              };
                              backFromSecond.onclick = () => secondPageDiv.style.display = 'none';

                              // 设置面板内的功能
                              document.getElementById('clearCacheBtn').onclick = () => {
                                  if (confirm('清除所有聊天记录？')) {
                                      chatMessages = [];
                                      secondMessages = [];
                                      renderMessages();
                                      renderSecondMessages();
                                      addLog('聊天缓存已清除');
                                      settingsModal.style.display = 'none';
                                  }
                              };
                              document.getElementById('themeToggleBtn').onclick = () => {
                                  document.body.style.backgroundColor = document.body.style.backgroundColor === 'black' ? '#f0fdfa' : 'black';
                                  addLog('主题切换（演示）');
                              };
                              document.getElementById('aboutBtn').onclick = () => {
                                  alert('小小怨 AI v1.0\n创始人：CY\n技术栈：WebView + Swift\n所有数据本地存储');
                              };

                              // 开屏动画2秒后移除
                              setTimeout(() => {
                                  const anim = document.getElementById('faceidAnim');
                                  if(anim) anim.remove();
                              }, 2000);

                              // 初始化
                              loadDeviceInfo();
                              loadAvatarAndNickname();
                              renderMessages();
                              renderSecondMessages();
                              sendBtn.onclick = sendMessage;
                              secondSendBtn.onclick = sendSecondMessage;
                              input.addEventListener('keypress', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
                              secondInput.addEventListener('keypress', (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendSecondMessage(); } });
                              addLog('应用启动完成');
                          })();
                      </script>
                  </body>
                  </html>
                  """
                  webView.loadHTMLString(html, baseURL: nil)
              }
              func userContentController(_ userContentController: WKUserContentController, didReceive message: WKScriptMessage) {
                  if message.name == "exitApp" {
                      (UIApplication.shared.delegate as? AppDelegate)?.exitApp()
                  }
              }
              override var supportedInterfaceOrientations: UIInterfaceOrientationMask { .all }
          }
          EOF

          cat > main.swift << 'EOF'
          import UIKit
          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          EOF

          cat > Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>XiaoxiaoYuanAI</string>
              <key>CFBundleIdentifier</key>
              <string>com.xiaoxiaoyuan.ai</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>小小怨AI</string>
              <key>CFBundlePackageType</key>
